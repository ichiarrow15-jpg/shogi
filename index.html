<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シンプル将棋</title>
<style>
  :root{
    --board-bg:#f3e0c2;
    --square-size:min(9vw,9vh);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:#e9dfcf;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    padding:10px;
  }
  #app{
    background:#f7ebd6;
    border:2px solid #b89b6b;
    border-radius:8px;
    padding:8px;
    max-width:900px;
    width:100%;
  }
  #top-bar{
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    align-items:center;
    margin-bottom:6px;
    gap:6px;
  }
  #controls{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    font-size:12px;
  }
  #controls label{display:flex;align-items:center;gap:4px;}
  #move-message{
    position:relative;
    flex:1;
    min-height:1.5em;
    font-size:13px;
    color:#333;
  }
  #move-toast{
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.75);
    color:#fff;
    padding:4px 10px;
    border-radius:999px;
    font-size:12px;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s;
    white-space:nowrap;
  }
  #board-wrapper{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
  }
  #board{
    background:var(--board-bg);
    border:2px solid #b89b6b;
    display:grid;
    grid-template-columns:repeat(9,var(--square-size));
    grid-template-rows:repeat(9,var(--square-size));
    touch-action:manipulation;
  }
  .square{
    border:1px solid #c9a973;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,0.2);
  }
  .square.dark{
    background:rgba(0,0,0,0.02);
  }
  .square.highlight{
    box-shadow:inset 0 0 0 3px rgba(0,150,255,0.7);
    background:rgba(150,210,255,0.35);
  }
  .piece{
    width:80%;
    height:80%;
    background:#fdf5e6;
    border-radius:6px;
    border:1px solid #b08b4a;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    font-weight:700;
    font-size:calc(var(--square-size)*0.45);
    line-height:1;
    user-select:none;
    touch-action:none;
  }
  .piece.player{color:#222;}
  .piece.enemy{color:#1b4f9c;}
  .piece.promoted{
    background:#ffe9e9;
    border-color:#d33;
  }
  .piece .promark{
    position:absolute;
    top:2px;
    left:3px;
    font-size:0.45em;
    color:#d00;
    font-weight:900;
  }
  .piece.selected{
    outline:3px solid #ff9800;
  }
  .piece.enemy{
    transform:rotate(180deg);
  }
  #side-panels{
    display:flex;
    flex-direction:column;
    gap:8px;
    min-width:90px;
    font-size:11px;
  }
  .captured-box{
    background:#f3e0c2;
    border:1px solid #b89b6b;
    border-radius:4px;
    padding:4px;
  }
  .captured-title{
    font-weight:700;
    margin-bottom:2px;
    text-align:center;
  }
  .captured-list{
    display:flex;
    flex-wrap:wrap;
    gap:2px;
    justify-content:center;
  }
  .cap-piece{
    width:26px;
    height:26px;
    border-radius:4px;
    border:1px solid #b08b4a;
    background:#fff7e6;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
  }
  .cap-piece.selected{
    outline:2px solid #ff9800;
  }
  #status{
    margin-top:4px;
    font-size:11px;
    text-align:center;
  }
  #overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:50;
    opacity:0;
    pointer-events:none;
    transition:opacity .4s;
  }
  #overlay.show{
    opacity:1;
    pointer-events:auto;
  }
  #overlay-content{
    text-align:center;
    color:#fff;
    animation:pulse 1.2s infinite;
  }
  #overlay-content h1{
    font-size:40px;
    margin-bottom:10px;
  }
  #overlay-content button{
    margin-top:10px;
    padding:6px 16px;
    border-radius:999px;
    border:none;
    background:#ffeb3b;
    color:#333;
    font-weight:700;
    cursor:pointer;
  }
  @keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
  }
  @media (max-width:600px){
    :root{--square-size:10vw;}
    #top-bar{flex-direction:column;align-items:flex-start;}
    #side-panels{flex-direction:row;justify-content:space-between;width:100%;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="top-bar">
    <div id="controls">
      <label>難易度
        <input type="range" id="difficulty" min="1" max="10" value="5">
        <span id="diff-label">5</span>
      </label>
      <label>
        <input type="checkbox" id="highlightToggle" checked>
        いけるマス表示
      </label>
      <span id="turn-label">あなたの手番</span>
    </div>
    <div id="move-message">
      <div id="move-toast"></div>
    </div>
  </div>

  <div id="board-wrapper">
    <div id="board"></div>
    <div id="side-panels">
      <div class="captured-box">
        <div class="captured-title">あなたの持ち駒</div>
        <div id="player-captured" class="captured-list"></div>
      </div>
      <div class="captured-box">
        <div class="captured-title">相手の持ち駒</div>
        <div id="enemy-captured" class="captured-list"></div>
      </div>
      <div id="status"></div>
    </div>
  </div>
</div>

<div id="overlay">
  <div id="overlay-content">
    <h1 id="result-text"></h1>
    <p id="result-sub"></p>
    <button id="restart-btn">もう一度</button>
  </div>
</div>

<script>
(() => {
  const boardEl = document.getElementById('board');
  const playerCapEl = document.getElementById('player-captured');
  const enemyCapEl = document.getElementById('enemy-captured');
  const diffInput = document.getElementById('difficulty');
  const diffLabel = document.getElementById('diff-label');
  const highlightToggle = document.getElementById('highlightToggle');
  const turnLabel = document.getElementById('turn-label');
  const statusEl = document.getElementById('status');
  const toastEl = document.getElementById('move-toast');
  const overlay = document.getElementById('overlay');
  const resultText = document.getElementById('result-text');
  const resultSub = document.getElementById('result-sub');
  const restartBtn = document.getElementById('restart-btn');

  const PIECE_CHARS = {
    FU:'歩', KY:'香', KE:'桂', GI:'銀', KI:'金',
    OU:'王', GY:'玉', KA:'角', HI:'飛'
  };
  const PROMOTED_CHARS = {
    FU:'と', KY:'杏', KE:'圭', GI:'全', KA:'馬', HI:'龍'
  };
  const MOVE_NAMES = {
    FU:'歩の手', KY:'香の手', KE:'桂の手', GI:'銀の手',
    KI:'金の手', OU:'王の手', GY:'玉の手',
    KA:'角の手', HI:'飛の手'
  };

  let board = [];
  let playerCaptured = [];
  let enemyCaptured = [];
  let currentPlayer = 'P'; // P: player, E: enemy
  let selected = null; // {x,y} or {drop:true,type,owner}
  let selectedCapIndex = null;
  let gameOver = false;
  let toastTimer = null;

  function initBoard(){
    board = Array.from({length:9},()=>Array(9).fill(null));
    // helper
    const place = (x,y,owner,type)=>{board[y][x]={owner,type,promoted:false};};

    // bottom (player)
    const bottomRow = ['KY','KE','GI','KI','OU','KI','GI','KE','KY'];
    bottomRow.forEach((t,x)=>place(x,8,'P',t));
    place(1,7,'P','HI'); // 飛 右
    place(7,7,'P','KA'); // 角 左
    for(let x=0;x<9;x++) place(x,6,'P','FU');

    // top (enemy)
    const topRow = ['KY','KE','GI','KI','GY','KI','GI','KE','KY']; // 玉
    topRow.forEach((t,x)=>place(x,0,'E',t));
    place(1,1,'E','HI'); // 飛 右（相手から見て）
    place(7,1,'E','KA'); // 角 左
    for(let x=0;x<9;x++) place(x,2,'E','FU');
  }

  function renderBoard(){
    boardEl.innerHTML='';
    for(let y=0;y<9;y++){
      for(let x=0;x<9;x++){
        const sq = document.createElement('div');
        sq.className='square'+(((x+y)&1)?' dark':'');
        sq.dataset.x=x;
        sq.dataset.y=y;
        const piece = board[y][x];
        if(piece){
          const el = document.createElement('div');
          el.className='piece '+(piece.owner==='P'?'player':'enemy')+(piece.promoted?' promoted':'');
          el.dataset.x=x;
          el.dataset.y=y;
          el.textContent = piece.promoted && PROMOTED_CHARS[piece.type] ? PROMOTED_CHARS[piece.type] : PIECE_CHARS[piece.type];
          if(piece.promoted){
            const pm = document.createElement('div');
            pm.className='promark';
            pm.textContent='成';
            el.appendChild(pm);
          }
          if(selected && !selected.drop && selected.x===x && selected.y===y){
            el.classList.add('selected');
          }
          sq.appendChild(el);
        }
        boardEl.appendChild(sq);
      }
    }
    if(selected && selected.drop){
      document.querySelectorAll('.cap-piece').forEach((el,i)=>{
        if(i===selectedCapIndex) el.classList.add('selected');
        else el.classList.remove('selected');
      });
    }else{
      document.querySelectorAll('.cap-piece').forEach(el=>el.classList.remove('selected'));
    }
    updateCaptured();
    updateStatus();
  }

  function updateCaptured(){
    playerCapEl.innerHTML='';
    enemyCapEl.innerHTML='';
    playerCaptured.forEach((p,i)=>{
      const el=document.createElement('div');
      el.className='cap-piece';
      el.dataset.owner='P';
      el.dataset.index=i;
      el.textContent=PIECE_CHARS[p.type];
      playerCapEl.appendChild(el);
    });
    enemyCaptured.forEach((p,i)=>{
      const el=document.createElement('div');
      el.className='cap-piece';
      el.dataset.owner='E';
      el.dataset.index=i;
      el.textContent=PIECE_CHARS[p.type];
      enemyCapEl.appendChild(el);
    });
  }

  function updateStatus(){
    turnLabel.textContent = currentPlayer==='P'?'あなたの手番':'相手の手番';
    statusEl.textContent = '王：あなた / 玉：相手';
  }

  function inBounds(x,y){return x>=0 && x<9 && y>=0 && y<9;}

  function isPromotionZone(owner,y){
    return owner==='P' ? y<=2 : y>=6;
  }

  function cloneBoardState(){
    return {
      board: board.map(row=>row.map(p=>p?{...p}:null)),
      playerCaptured: playerCaptured.map(p=>({...p})),
      enemyCaptured: enemyCaptured.map(p=>({...p})),
      currentPlayer
    };
  }

  function restoreBoardState(state){
    board = state.board.map(row=>row.map(p=>p?{...p}:null));
    playerCaptured = state.playerCaptured.map(p=>({...p}));
    enemyCaptured = state.enemyCaptured.map(p=>({...p}));
    currentPlayer = state.currentPlayer;
  }

  function getMovesForPiece(x,y){
    const piece = board[y][x];
    if(!piece) return [];
    const dir = piece.owner==='P' ? -1 : 1;
    const moves=[];
    const addStep=(dx,dy,repeat=false)=>{
      let nx=x+dx, ny=y+dy;
      while(inBounds(nx,ny)){
        const target=board[ny][nx];
        if(target && target.owner===piece.owner) break;
        moves.push({x:nx,y:ny});
        if(target && target.owner!==piece.owner) break;
        if(!repeat) break;
        nx+=dx; ny+=dy;
      }
    };
    const t = piece.type;
    const promoted = piece.promoted;
    if(t==='FU' && !promoted){
      addStep(0,dir);
    }else if(t==='FU' && promoted || t==='KI' || t==='OU' && false){
      // 金とと金系（簡略：金と同じ）
      const goldSteps = [
        {dx:0,dy:dir},{dx:-1,dy:dir},{dx:1,dy:dir},
        {dx:-1,dy:0},{dx:1,dy:0},{dx:0,dy:-dir}
      ];
      goldSteps.forEach(s=>addStep(s.dx,s.dy));
    }
    if(t==='KY' && !promoted){
      addStep(0,dir,true);
    }else if(t==='KY' && promoted){
      const goldSteps = [
        {dx:0,dy:dir},{dx:-1,dy:dir},{dx:1,dy:dir},
        {dx:-1,dy:0},{dx:1,dy:0},{dx:0,dy:-dir}
      ];
      goldSteps.forEach(s=>addStep(s.dx,s.dy));
    }
    if(t==='KE' && !promoted){
      const steps = [
        {dx:-1,dy:2*dir},{dx:1,dy:2*dir}
      ];
      steps.forEach(s=>addStep(s.dx,s.dy));
    }else if(t==='KE' && promoted){
      const goldSteps = [
        {dx:0,dy:dir},{dx:-1,dy:dir},{dx:1,dy:dir},
        {dx:-1,dy:0},{dx:1,dy:0},{dx:0,dy:-dir}
      ];
      goldSteps.forEach(s=>addStep(s.dx,s.dy));
    }
    if(t==='GI' && !promoted){
      const steps = [
        {dx:0,dy:dir},{dx:-1,dy:dir},{dx:1,dy:dir},
        {dx:-1,dy:-dir},{dx:1,dy:-dir}
      ];
      steps.forEach(s=>addStep(s.dx,s.dy));
    }else if(t==='GI' && promoted){
      const goldSteps = [
        {dx:0,dy:dir},{dx:-1,dy:dir},{dx:1,dy:dir},
        {dx:-1,dy:0},{dx:1,dy:0},{dx:0,dy:-dir}
      ];
      goldSteps.forEach(s=>addStep(s.dx,s.dy));
    }
    if(t==='KI'){
      const goldSteps = [
        {dx:0,dy:dir},{dx:-1,dy:dir},{dx:1,dy:dir},
        {dx:-1,dy:0},{dx:1,dy:0},{dx:0,dy:-dir}
      ];
      goldSteps.forEach(s=>addStep(s.dx,s.dy));
    }
    if(t==='OU' || t==='GY'){
      const steps = [
        {dx:0,dy:1},{dx:0,dy:-1},{dx:1,dy:0},{dx:-1,dy:0},
        {dx:1,dy:1},{dx:-1,dy:1},{dx:1,dy:-1},{dx:-1,dy:-1}
      ];
      steps.forEach(s=>addStep(s.dx,s.dy));
    }
    if(t==='KA'){
      addStep(1,1,true);addStep(-1,1,true);addStep(1,-1,true);addStep(-1,-1,true);
      if(promoted){
        addStep(0,1);addStep(0,-1);addStep(1,0);addStep(-1,0);
      }
    }
    if(t==='HI'){
      addStep(0,1,true);addStep(0,-1,true);addStep(1,0,true);addStep(-1,0,true);
      if(promoted){
        addStep(1,1);addStep(-1,1);addStep(1,-1);addStep(-1,-1);
      }
    }
    return moves;
  }

  function getAllMoves(owner){
    const moves=[];
    for(let y=0;y<9;y++){
      for(let x=0;x<9;x++){
        const p=board[y][x];
        if(p && p.owner===owner){
          const list=getMovesForPiece(x,y);
          list.forEach(m=>{
            moves.push({from:{x,y},to:m,piece:p});
          });
        }
      }
    }
    // drops
    const caps = owner==='P'?playerCaptured:enemyCaptured;
    caps.forEach((p,idx)=>{
      for(let y=0;y<9;y++){
        for(let x=0;x<9;x++){
          if(!board[y][x]){
            // 簡略：二歩などの禁じ手は無視
            moves.push({drop:true,dropIndex:idx,dropPiece:p,to:{x,y}});
          }
        }
      }
    });
    return moves;
  }

  function applyMove(move){
    if(move.drop){
      const owner = currentPlayer;
      const caps = owner==='P'?playerCaptured:enemyCaptured;
      const p = caps.splice(move.dropIndex,1)[0];
      board[move.to.y][move.to.x]={owner,type:p.type,promoted:false};
      return {captured:null,from:null,to:move.to,piece:board[move.to.y][move.to.x],drop:true};
    }else{
      const fromPiece = board[move.from.y][move.from.x];
      const target = board[move.to.y][move.to.x];
      let captured=null;
      if(target){
        captured={...target,promoted:false};
        if(target.owner==='P') enemyCaptured.push(captured);
        else playerCaptured.push(captured);
      }
      board[move.to.y][move.to.x]=fromPiece;
      board[move.from.y][move.from.x]=null;
      // auto promotion when entering enemy zone (except king/gold)
      if(!fromPiece.promoted && !['KI','OU','GY'].includes(fromPiece.type)){
        if(isPromotionZone(fromPiece.owner,move.to.y)){
          fromPiece.promoted=true;
        }
      }
      return {captured,from:move.from,to:move.to,piece:fromPiece,drop:false};
    }
  }

  function isKingCaptured(owner){
    for(let y=0;y<9;y++){
      for(let x=0;x<9;x++){
        const p=board[y][x];
        if(p && p.owner===owner && (p.type==='OU' || p.type==='GY')) return false;
      }
    }
    return true;
  }

  function showResult(win){
    gameOver=true;
    resultText.textContent = win?'勝利！':'敗北…';
    resultSub.textContent = win?'お見事です。':'また挑戦してみましょう。';
    overlay.classList.add('show');
  }

  function showMoveName(pieceType,owner){
    const name = MOVE_NAMES[pieceType] || '手';
    const prefix = owner==='P'?'あなたの':'相手の';
    const text = prefix + name;
    toastEl.textContent=text;
    toastEl.style.opacity=1;
    if(toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>{toastEl.style.opacity=0;},2500);
  }

  function clearHighlights(){
    document.querySelectorAll('.square').forEach(s=>s.classList.remove('highlight'));
  }

  function highlightMoves(x,y){
    if(!highlightToggle.checked) return;
    clearHighlights();
    const moves=getMovesForPiece(x,y);
    moves.forEach(m=>{
      const idx=m.y*9+m.x;
      const sq=boardEl.children[idx];
      if(sq) sq.classList.add('highlight');
    });
  }

  function handleSquareClick(x,y){
    if(gameOver || currentPlayer!=='P') return;
    const piece = board[y][x];
    if(selected && selected.drop){
      // drop selected captured piece
      if(!piece){
        const caps = playerCaptured;
        const cap = caps[selectedCapIndex];
        if(!cap) return;
        // 簡略：二歩などはチェックしない
        board[y][x]={owner:'P',type:cap.type,promoted:false};
        caps.splice(selectedCapIndex,1);
        showMoveName(cap.type,'P');
        selected=null;
        selectedCapIndex=null;
        clearHighlights();
        renderBoard();
        endTurn();
      }
      return;
    }
    if(piece && piece.owner==='P'){
      if(selected && !selected.drop && selected.x===x && selected.y===y){
        selected=null;
        clearHighlights();
      }else{
        selected={x,y};
        clearHighlights();
        highlightMoves(x,y);
      }
      renderBoard();
    }else if(selected && !selected.drop){
      const fromPiece = board[selected.y][selected.x];
      const moves=getMovesForPiece(selected.x,selected.y);
      if(moves.some(m=>m.x===x && m.y===y)){
        const target=board[y][x];
        if(target && target.owner==='P') return;
        const move={from:{x:selected.x,y:selected.y},to:{x,y},piece:fromPiece};
        applyMove(move);
        showMoveName(fromPiece.type,'P');
        selected=null;
        clearHighlights();
        renderBoard();
        endTurn();
      }
    }
  }

  function handleCapturedClick(owner,index){
    if(gameOver || currentPlayer!=='P') return;
    if(owner!=='P') return;
    selected={drop:true};
    selectedCapIndex=index;
    clearHighlights();
    renderBoard();
  }

  function aiMove(){
    if(gameOver) return;
    const difficulty = parseInt(diffInput.value,10);
    const moves = getAllMoves('E');
    if(moves.length===0){
      showResult(true);
      return;
    }
    // simple scoring
    function scoreMove(m){
      let s=0;
      if(m.drop){
        // prefer drops near player side
        s += (8-m.to.y)*0.5;
      }else{
        const target = m.to && board[m.to.y][m.to.x];
        if(target && target.owner==='P'){
          const val = {FU:1,KY:3,KE:3,GI:4,KI:5,KA:8,HI:9,OU:100,GY:100}[target.type]||1;
          s += val*3;
        }
        // advance towards player
        s += (m.from.y - m.to.y)*0.3;
      }
      // random noise
      s += Math.random()* (difficulty/10);
      return s;
    }
    // simulate on copy to avoid using updated board mid-loop
    const scored = moves.map(m=>({m,score:scoreMove(m)}));
    scored.sort((a,b)=>b.score-a.score);
    const topN = Math.max(1,Math.floor(1 + (11-difficulty))); // 高難度ほど候補少なく
    const choice = scored[Math.floor(Math.random()*Math.min(topN,scored.length))].m;

    // apply on real board
    const result = applyMove(choice);
    const pType = choice.drop ? choice.dropPiece.type : choice.piece.type;
    showMoveName(pType,'E');
    renderBoard();

    if(isKingCaptured('P')){
      showResult(false);
      return;
    }
    currentPlayer='P';
    updateStatus();
  }

  function endTurn(){
    if(isKingCaptured('E')){
      showResult(true);
      return;
    }
    currentPlayer='E';
    updateStatus();
    setTimeout(aiMove,400 + (11-parseInt(diffInput.value,10))*40);
  }

  boardEl.addEventListener('click',e=>{
    const sq = e.target.closest('.square');
    const pieceEl = e.target.closest('.piece');
    if(!sq && !pieceEl) return;
    const x = parseInt((pieceEl||sq).dataset.x,10);
    const y = parseInt((pieceEl||sq).dataset.y,10);
    handleSquareClick(x,y);
  });

  playerCapEl.addEventListener('click',e=>{
    const cap = e.target.closest('.cap-piece');
    if(!cap) return;
    handleCapturedClick(cap.dataset.owner,parseInt(cap.dataset.index,10));
  });

  enemyCapEl.addEventListener('click',()=>{ /* no-op */ });

  diffInput.addEventListener('input',()=>{
    diffLabel.textContent=diffInput.value;
  });

  restartBtn.addEventListener('click',()=>{
    overlay.classList.remove('show');
    gameOver=false;
    playerCaptured=[];
    enemyCaptured=[];
    currentPlayer='P';
    selected=null;
    selectedCapIndex=null;
    clearHighlights();
    initBoard();
    renderBoard();
  });

  // 初期化
  initBoard();
  renderBoard();
})();
</script>
</body>
</html>
