<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シンプル将棋</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --board-size: min(90vw, 90vh);
    --cell-border: 1px solid #444;
    --highlight-move: rgba(255, 230, 150, 0.9);
    --highlight-select: rgba(180, 220, 255, 0.9);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f3f0e6;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px;
    color: #222;
  }
  #top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 6px 10px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-size: 14px;
    text-align: center;
    opacity: 0;
    transform: translateY(-100%);
    transition: opacity .3s, transform .3s;
    z-index: 20;
  }
  #top-bar.show {
    opacity: 1;
    transform: translateY(0);
  }
  #controls {
    margin-top: 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  #difficulty {
    padding: 2px 4px;
  }
  #board-wrapper {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #board {
    width: var(--board-size);
    height: var(--board-size);
    max-width: 480px;
    max-height: 480px;
    background: #f7d58a;
    border: 2px solid #333;
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-template-rows: repeat(9, 1fr);
  }
  .cell {
    border: var(--cell-border);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(14px, 3.5vw, 26px);
    user-select: none;
  }
  .cell-inner {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1 / 1;
  }
  .piece {
    width: 80%;
    height: 80%;
    border-radius: 4px;
    background: #fdf7e3;
    border: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    writing-mode: vertical-rl;
    text-orientation: upright;
  }
  .black { color: #111; }
  .white { color: #b11; transform: rotate(180deg); }
  .selected {
    background: var(--highlight-select);
  }
  .move-highlight {
    background: var(--highlight-move);
  }
  #captured-area {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
    max-width: 480px;
    font-size: 13px;
  }
  .captured-row {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .captured-label {
    width: 3em;
  }
  .captured-pieces {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .captured-piece {
    min-width: 24px;
    padding: 2px 4px;
    border-radius: 3px;
    border: 1px solid #444;
    background: #fff;
    text-align: center;
    cursor: pointer;
  }
  .captured-piece.selected {
    background: #cde6ff;
  }
  #status {
    margin-top: 6px;
    font-size: 14px;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 30;
  }
  #overlay-content {
    background: #fff;
    padding: 20px 24px;
    border-radius: 8px;
    text-align: center;
  }
  #overlay-content h1 {
    margin: 0 0 10px;
    font-size: 24px;
  }
  #overlay-content button {
    margin-top: 8px;
    padding: 6px 12px;
    font-size: 14px;
  }
</style>
</head>
<body>
<div id="top-bar"></div>

<div id="controls">
  <label>難易度:
    <select id="difficulty">
      <option value="1">1（やさしい）</option>
      <option value="2">2</option>
      <option value="3" selected>3</option>
      <option value="4">4</option>
      <option value="5">5（むずかしい）</option>
    </select>
  </label>
  <label>
    <input type="checkbox" id="toggle-highlight" checked> 駒のいける方向表示
  </label>
</div>

<div id="board-wrapper">
  <div id="board"></div>
  <div id="captured-area">
    <div class="captured-row">
      <div class="captured-label">先手</div>
      <div id="captured-black" class="captured-pieces"></div>
    </div>
    <div class="captured-row">
      <div class="captured-label">後手</div>
      <div id="captured-white" class="captured-pieces"></div>
    </div>
  </div>
  <div id="status"></div>
</div>

<div id="overlay">
  <div id="overlay-content">
    <h1 id="result-text"></h1>
    <button id="restart-btn">もう一度</button>
  </div>
</div>

<script>
  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const capturedBlackEl = document.getElementById('captured-black');
  const capturedWhiteEl = document.getElementById('captured-white');
  const difficultyEl = document.getElementById('difficulty');
  const toggleHighlightEl = document.getElementById('toggle-highlight');
  const topBarEl = document.getElementById('top-bar');
  const overlayEl = document.getElementById('overlay');
  const resultTextEl = document.getElementById('result-text');
  const restartBtn = document.getElementById('restart-btn');

  const SIZE = 9;
  let board = [];
  let turn = 'black'; // black = 先手, white = 後手(AI)
  let selected = null;
  let selectedDrop = null;
  let legalMoves = [];
  let captured = { black: [], white: [] };
  let gameOver = false;
  let topBarTimer = null;

  const PIECES = {
    FU: { name: '歩', value: 1 },
    KY: { name: '香', value: 3 },
    KE: { name: '桂', value: 3 },
    GI: { name: '銀', value: 4 },
    KI: { name: '金', value: 5 },
    KA: { name: '角', value: 8 },
    HI: { name: '飛', value: 9 },
    OU: { name: '王', value: 100 },
    GY: { name: '玉', value: 100 }
  };

  function initBoard() {
    board = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
    captured = { black: [], white: [] };
    gameOver = false;
    turn = 'black';
    selected = null;
    selectedDrop = null;
    legalMoves = [];
    clearTopBar();
    overlayEl.style.display = 'none';

    // 先手側（下）
    const bottomRow = ['KY','KE','GI','KI','OU','KI','GI','KE','KY'];
    for (let x = 0; x < SIZE; x++) {
      board[8][x] = { type: bottomRow[x], owner: 'black', promoted: false };
    }
    board[7][1] = { type: 'KA', owner: 'black', promoted: false }; // 角 左
    board[7][7] = { type: 'HI', owner: 'black', promoted: false }; // 飛 右
    for (let x = 0; x < SIZE; x++) {
      board[6][x] = { type: 'FU', owner: 'black', promoted: false };
    }

    // 後手側（上）
    const topRow = ['KY','KE','GI','KI','GY','KI','GI','KE','KY'];
    for (let x = 0; x < SIZE; x++) {
      board[0][x] = { type: topRow[x], owner: 'white', promoted: false };
    }
    board[1][7] = { type: 'KA', owner: 'white', promoted: false }; // 角 左（後手から見て）
    board[1][1] = { type: 'HI', owner: 'white', promoted: false }; // 飛 右（後手から見て）
    for (let x = 0; x < SIZE; x++) {
      board[2][x] = { type: 'FU', owner: 'white', promoted: false };
    }

    renderBoard();
    updateCapturedUI();
    updateStatus();
  }

  function renderBoard() {
    boardEl.innerHTML = '';
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.x = x;
        cell.dataset.y = y;
        const inner = document.createElement('div');
        inner.className = 'cell-inner';
        const piece = board[y][x];
        if (piece) {
          const pEl = document.createElement('div');
          pEl.className = 'piece ' + piece.owner;
          pEl.textContent = pieceName(piece);
          inner.appendChild(pEl);
        }
        cell.appendChild(inner);
        boardEl.appendChild(cell);
      }
    }
    applyHighlights();
  }

  function pieceName(p) {
    if (p.promoted && p.type === 'FU') return 'と';
    if (p.promoted && p.type === 'KY') return '成香';
    if (p.promoted && p.type === 'KE') return '成桂';
    if (p.promoted && p.type === 'GI') return '成銀';
    if (p.promoted && (p.type === 'KA' || p.type === 'HI')) {
      return p.type === 'KA' ? '馬' : '龍';
    }
    return PIECES[p.type].name;
  }

  function updateStatus() {
    if (gameOver) return;
    statusEl.textContent = (turn === 'black') ? '先手の手番' : '後手（CPU）の手番';
  }

  function applyHighlights() {
    const cells = boardEl.querySelectorAll('.cell');
    cells.forEach(c => {
      c.classList.remove('selected', 'move-highlight');
    });
    if (selected) {
      const selCell = getCellEl(selected.x, selected.y);
      if (selCell) selCell.classList.add('selected');
    }
    if (toggleHighlightEl.checked) {
      for (const m of legalMoves) {
        const c = getCellEl(m.to.x, m.to.y);
        if (c) c.classList.add('move-highlight');
      }
    }
  }

  function getCellEl(x, y) {
    return boardEl.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
  }

  boardEl.addEventListener('click', e => {
    if (gameOver) return;
    if (turn !== 'black') return;
    const cell = e.target.closest('.cell');
    if (!cell) return;
    const x = parseInt(cell.dataset.x, 10);
    const y = parseInt(cell.dataset.y, 10);

    if (selectedDrop) {
      handleDropClick(x, y);
      return;
    }

    const piece = board[y][x];
    if (selected && selected.x === x && selected.y === y) {
      selected = null;
      legalMoves = [];
      applyHighlights();
      return;
    }
    if (piece && piece.owner === 'black') {
      selected = { x, y };
      legalMoves = generateMovesFor(x, y, 'black');
      applyHighlights();
    } else if (selected) {
      const move = legalMoves.find(m => m.to.x === x && m.to.y === y);
      if (move) {
        makeMove(move);
      } else {
        selected = null;
        legalMoves = [];
        applyHighlights();
      }
    }
  });

  function handleDropClick(x, y) {
    if (board[y][x]) return;
    const moves = generateDropsFor('black', selectedDrop.type);
    const move = moves.find(m => m.to.x === x && m.to.y === y);
    if (move) {
      makeMove(move);
      selectedDrop = null;
      updateCapturedUI();
    } else {
      selectedDrop = null;
      updateCapturedUI();
    }
  }

  function updateCapturedUI() {
    capturedBlackEl.innerHTML = '';
    capturedWhiteEl.innerHTML = '';
    const groupByType = (arr) => {
      const map = {};
      for (const p of arr) {
        const key = p.type;
        map[key] = (map[key] || 0) + 1;
      }
      return map;
    };
    const blackMap = groupByType(captured.black);
    const whiteMap = groupByType(captured.white);

    for (const [type, count] of Object.entries(blackMap)) {
      const el = document.createElement('div');
      el.className = 'captured-piece';
      if (selectedDrop && selectedDrop.owner === 'black' && selectedDrop.type === type) {
        el.classList.add('selected');
      }
      el.textContent = PIECES[type].name + '×' + count;
      el.dataset.owner = 'black';
      el.dataset.type = type;
      el.addEventListener('click', () => {
        if (turn !== 'black' || gameOver) return;
        if (selectedDrop && selectedDrop.type === type && selectedDrop.owner === 'black') {
          selectedDrop = null;
        } else {
          selected = null;
          legalMoves = [];
          selectedDrop = { owner: 'black', type };
        }
        applyHighlights();
        updateCapturedUI();
      });
      capturedBlackEl.appendChild(el);
    }

    for (const [type, count] of Object.entries(whiteMap)) {
      const el = document.createElement('div');
      el.className = 'captured-piece';
      el.textContent = PIECES[type].name + '×' + count;
      capturedWhiteEl.appendChild(el);
    }
  }

  function inside(x, y) {
    return x >= 0 && x < SIZE && y >= 0 && y < SIZE;
  }

  function cloneBoardState() {
    return {
      board: board.map(row => row.map(p => p ? { ...p } : null)),
      captured: {
        black: captured.black.map(p => ({ ...p })),
        white: captured.white.map(p => ({ ...p }))
      },
      turn
    };
  }

  function restoreBoardState(state) {
    board = state.board.map(row => row.map(p => p ? { ...p } : null));
    captured = {
      black: state.captured.black.map(p => ({ ...p })),
      white: state.captured.white.map(p => ({ ...p }))
    };
    turn = state.turn;
  }

  function generateMovesFor(x, y, owner) {
    const piece = board[y][x];
    if (!piece || piece.owner !== owner) return [];
    const moves = [];
    const dir = owner === 'black' ? -1 : 1;

    const addStep = (dx, dy) => {
      const nx = x + dx;
      const ny = y + dy;
      if (!inside(nx, ny)) return;
      const target = board[ny][nx];
      if (!target || target.owner !== owner) {
        moves.push({ from: { x, y }, to: { x: nx, y: ny }, drop: null });
      }
    };

    const addSlide = (dx, dy) => {
      let nx = x + dx;
      let ny = y + dy;
      while (inside(nx, ny)) {
        const target = board[ny][nx];
        if (!target) {
          moves.push({ from: { x, y }, to: { x: nx, y: ny }, drop: null });
        } else {
          if (target.owner !== owner) {
            moves.push({ from: { x, y }, to: { x: nx, y: ny }, drop: null });
          }
          break;
        }
        nx += dx;
        ny += dy;
      }
    };

    const pType = piece.type;
    const promoted = piece.promoted;

    if (!promoted) {
      switch (pType) {
        case 'FU':
          addStep(0, dir);
          break;
        case 'KY':
          addSlide(0, dir);
          break;
        case 'KE':
          addStep(-1, 2 * dir);
          addStep(1, 2 * dir);
          break;
        case 'GI':
          addStep(-1, dir);
          addStep(0, dir);
          addStep(1, dir);
          addStep(-1, -dir);
          addStep(1, -dir);
          break;
        case 'KI':
        case 'OU':
        case 'GY':
          addStep(0, dir);
          addStep(-1, dir);
          addStep(1, dir);
          addStep(-1, 0);
          addStep(1, 0);
          addStep(0, -dir);
          break;
        case 'KA':
          addSlide(1, 1);
          addSlide(-1, 1);
          addSlide(1, -1);
          addSlide(-1, -1);
          break;
        case 'HI':
          addSlide(1, 0);
          addSlide(-1, 0);
          addSlide(0, 1);
          addSlide(0, -1);
          break;
      }
    } else {
      if (pType === 'KA') {
        addSlide(1, 1);
        addSlide(-1, 1);
        addSlide(1, -1);
        addSlide(-1, -1);
        addStep(1, 0);
        addStep(-1, 0);
        addStep(0, 1);
        addStep(0, -1);
      } else if (pType === 'HI') {
        addSlide(1, 0);
        addSlide(-1, 0);
        addSlide(0, 1);
        addSlide(0, -1);
        addStep(1, 1);
        addStep(-1, 1);
        addStep(1, -1);
        addStep(-1, -1);
      } else {
        addStep(0, dir);
        addStep(-1, dir);
        addStep(1, dir);
        addStep(-1, 0);
        addStep(1, 0);
        addStep(0, -dir);
      }
    }

    // 自動成り（簡易）：敵陣に入るときは成りも候補に
    const result = [];
    for (const m of moves) {
      const ny = m.to.y;
      const inEnemyZone = owner === 'black' ? ny <= 2 : ny >= 6;
      if (inEnemyZone && canPromote(piece)) {
        result.push({ ...m, promote: true });
      }
      result.push({ ...m, promote: false });
    }
    return result;
  }

  function canPromote(piece) {
    return ['FU','KY','KE','GI','KA','HI'].includes(piece.type);
  }

  function generateDropsFor(owner, type) {
    const moves = [];
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        if (board[y][x]) continue;
        if (type === 'FU') {
          // 二歩禁止（簡易）
          let hasPawn = false;
          for (let yy = 0; yy < SIZE; yy++) {
            const p = board[yy][x];
            if (p && p.owner === owner && p.type === 'FU' && !p.promoted) {
              hasPawn = true;
              break;
            }
          }
          if (hasPawn) continue;
          if (owner === 'black' && y === 0) continue;
          if (owner === 'white' && y === 8) continue;
        }
        if (type === 'KY') {
          if (owner === 'black' && y === 0) continue;
          if (owner === 'white' && y === 8) continue;
        }
        if (type === 'KE') {
          if (owner === 'black' && y <= 1) continue;
          if (owner === 'white' && y >= 7) continue;
        }
        moves.push({ from: null, to: { x, y }, drop: { owner, type } });
      }
    }
    return moves;
  }

  function allMoves(owner) {
    const moves = [];
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        const p = board[y][x];
        if (p && p.owner === owner) {
          moves.push(...generateMovesFor(x, y, owner));
        }
      }
    }
    const capList = captured[owner];
    const types = [...new Set(capList.map(p => p.type))];
    for (const t of types) {
      moves.push(...generateDropsFor(owner, t));
    }
    return moves;
  }

  function makeMove(move, isSim = false) {
    const prevState = isSim ? null : cloneBoardState();
    let movePiece, capturedPiece = null;
    if (move.drop) {
      const owner = move.drop.owner;
      const idx = captured[owner].findIndex(p => p.type === move.drop.type);
      if (idx >= 0) {
        movePiece = captured[owner].splice(idx, 1)[0];
        movePiece.owner = owner;
        movePiece.promoted = false;
        board[move.to.y][move.to.x] = movePiece;
      }
    } else {
      movePiece = board[move.from.y][move.from.x];
      const target = board[move.to.y][move.to.x];
      if (target) {
        capturedPiece = { type: target.type, owner: movePiece.owner, promoted: false };
        captured[movePiece.owner].push(capturedPiece);
      }
      board[move.from.y][move.from.x] = null;
      board[move.to.y][move.to.x] = movePiece;
      if (move.promote) {
        movePiece.promoted = true;
      }
    }

    if (!isSim) {
      const moveText = describeMove(move, movePiece, capturedPiece);
      showTopBar(moveText);
      renderBoard();
      updateCapturedUI();
      if (checkWin()) return;
      turn = (turn === 'black') ? 'white' : 'black';
      selected = null;
      selectedDrop = null;
      legalMoves = [];
      applyHighlights();
      updateStatus();
      if (turn === 'white' && !gameOver) {
        setTimeout(aiTurn, 300);
      }
    }
  }

  function describeMove(move, piece, capturedPiece) {
    const ownerName = (piece.owner === 'black') ? '先手' : '後手';
    const typeName = pieceName(piece);
    const to = move.to;
    const file = 9 - to.x;
    const rank = to.y + 1;
    let action = move.drop ? '打' : '動';
    if (capturedPiece) action = '取';
    if (move.promote) action += '成';
    return `${ownerName}：${typeName}${file}${rank}${action}`;
  }

  function showTopBar(text) {
    topBarEl.textContent = text;
    topBarEl.classList.add('show');
    if (topBarTimer) clearTimeout(topBarTimer);
    topBarTimer = setTimeout(() => {
      clearTopBar();
    }, 2500);
  }

  function clearTopBar() {
    topBarEl.classList.remove('show');
  }

  function checkWin() {
    let hasBlackKing = false;
    let hasWhiteKing = false;
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        const p = board[y][x];
        if (!p) continue;
        if (p.type === 'OU' && p.owner === 'black') hasBlackKing = true;
        if (p.type === 'GY' && p.owner === 'white') hasWhiteKing = true;
      }
    }
    if (!hasBlackKing || !hasWhiteKing) {
      gameOver = true;
      const winSide = hasBlackKing ? '先手の勝ち' : '後手（CPU）の勝ち';
      resultTextEl.textContent = winSide;
      overlayEl.style.display = 'flex';
      statusEl.textContent = winSide;
      return true;
    }
    return false;
  }

  function evaluate(owner) {
    let score = 0;
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        const p = board[y][x];
        if (!p) continue;
        const base = PIECES[p.type].value + (p.promoted ? 1 : 0);
        score += (p.owner === owner ? base : -base);
      }
    }
    for (const p of captured[owner]) score += PIECES[p.type].value * 0.8;
    for (const p of captured[owner === 'black' ? 'white' : 'black']) score -= PIECES[p.type].value * 0.8;
    return score;
  }

  function aiTurn() {
    if (gameOver) return;
    const diff = parseInt(difficultyEl.value, 10);
    const moves = allMoves('white');
    if (moves.length === 0) {
      gameOver = true;
      resultTextEl.textContent = '先手の勝ち';
      overlayEl.style.display = 'flex';
      statusEl.textContent = '先手の勝ち';
      return;
    }

    let chosen;
    if (diff === 1) {
      chosen = moves[Math.floor(Math.random() * moves.length)];
    } else {
      let bestScore = -Infinity;
      const scored = [];
      for (const m of moves) {
        const state = cloneBoardState();
        makeMove(m, true);
        const s = evaluate('white');
        scored.push({ move: m, score: s });
        restoreBoardState(state);
      }
      scored.sort((a, b) => b.score - a.score);
      if (diff === 2) {
        const top = scored.slice(0, Math.min(5, scored.length));
        chosen = top[Math.floor(Math.random() * top.length)].move;
      } else if (diff === 3) {
        const top = scored.slice(0, Math.min(3, scored.length));
        chosen = top[Math.floor(Math.random() * top.length)].move;
      } else if (diff === 4) {
        chosen = scored[0].move;
      } else {
        const top = scored.slice(0, Math.min(4, scored.length));
        chosen = top[Math.floor(Math.random() * top.length)].move;
      }
    }
    makeMove(chosen);
  }

  restartBtn.addEventListener('click', () => {
    initBoard();
  });

  toggleHighlightEl.addEventListener('change', () => {
    applyHighlights();
  });

  initBoard();
</script>
</body>
</html>
