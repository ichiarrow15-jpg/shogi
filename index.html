<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シンプル将棋</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --board-size: min(90vw, 90vh);
    --cell-size: calc(var(--board-size) / 9);
    --bg-color: #f3e1c5;
    --board-line: #8b6b3f;
    --highlight: rgba(255, 230, 120, 0.8);
    --select: rgba(180, 220, 255, 0.8);
    --ai-move: rgba(255, 180, 180, 0.7);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg-color);
    display: flex;
    justify-content: center;
  }
  #app {
    width: 100%;
    max-width: 900px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #top-bar {
    position: relative;
    min-height: 32px;
    font-size: 14px;
    color: #333;
  }
  #move-name-banner {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 0;
    padding: 4px 10px;
    background: rgba(0,0,0,0.75);
    color: #fff;
    border-radius: 16px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    white-space: nowrap;
    z-index: 20;
  }
  #controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    font-size: 14px;
  }
  #controls label {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #difficulty {
    padding: 2px 4px;
  }
  #board-wrapper {
    display: flex;
    flex-direction: row;
    gap: 6px;
    justify-content: center;
    align-items: stretch;
  }
  @media (max-width: 700px) {
    #board-wrapper {
      flex-direction: column;
      align-items: center;
    }
  }
  .captured-area {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 12px;
    min-width: 70px;
  }
  .captured-title {
    text-align: center;
    font-weight: 600;
  }
  .captured-pieces {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    justify-content: center;
  }
  .captured-piece {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    border: 1px solid #b08a4a;
    background: #fdf5e6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    cursor: pointer;
  }
  .captured-piece.selected {
    outline: 2px solid #0078d4;
  }
  #board {
    width: var(--board-size);
    height: var(--board-size);
    border: 3px solid var(--board-line);
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-template-rows: repeat(9, 1fr);
    background: #f9e7c8;
    position: relative;
  }
  .cell {
    border: 1px solid rgba(139,107,63,0.6);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--cell-size) * 0.45);
    user-select: none;
    touch-action: manipulation;
  }
  .cell.highlight-move {
    background: var(--highlight);
  }
  .cell.selected {
    background: var(--select);
  }
  .cell.ai-last {
    background: var(--ai-move);
  }
  .piece {
    width: 80%;
    height: 80%;
    border-radius: 6px;
    background: #fdf5e6;
    border: 2px solid #b08a4a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    position: relative;
  }
  .piece.sente {
    color: #000;
  }
  .piece.gote {
    color: #b00000;
    transform: rotate(180deg);
  }
  .piece.promoted {
    color: #d00000;
  }
  .piece-text {
    transform: rotate(0deg);
  }
  .piece.gote .piece-text {
    transform: rotate(180deg);
  }
  #status {
    font-size: 14px;
    text-align: center;
    min-height: 20px;
  }
  #result-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  #result-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  #result-box {
    background: #fffaf0;
    padding: 20px 26px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  #result-text {
    font-size: 24px;
    margin-bottom: 10px;
  }
  #result-sub {
    font-size: 14px;
    margin-bottom: 16px;
  }
  #restart-btn {
    padding: 6px 14px;
    border-radius: 999px;
    border: none;
    background: #0078d4;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">
  <div id="top-bar">
    <div id="move-name-banner"></div>
  </div>
  <div id="controls">
    <label>
      <span>難易度</span>
      <select id="difficulty">
        <option value="1">1（やさしい）</option>
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="4">4</option>
        <option value="5">5（つよい）</option>
      </select>
    </label>
    <label>
      <input type="checkbox" id="toggle-moves" checked>
      <span>駒のいける方向表示</span>
    </label>
  </div>
  <div id="board-wrapper">
    <div class="captured-area" id="captured-gote">
      <div class="captured-title">相手の持ち駒</div>
      <div class="captured-pieces" id="captured-gote-list"></div>
    </div>
    <div id="board"></div>
    <div class="captured-area" id="captured-sente">
      <div class="captured-title">自分の持ち駒</div>
      <div class="captured-pieces" id="captured-sente-list"></div>
    </div>
  </div>
  <div id="status"></div>
</div>

<div id="result-overlay">
  <div id="result-box">
    <div id="result-text"></div>
    <div id="result-sub"></div>
    <button id="restart-btn">もう一局</button>
  </div>
</div>

<script>
(function() {
  const SENTE = 'sente';
  const GOTE = 'gote';

  const PIECE_TYPES = {
    FU: 'FU',
    KY: 'KY',
    KE: 'KE',
    GI: 'GI',
    KI: 'KI',
    KA: 'KA',
    HI: 'HI',
    OU: 'OU',
    GY: 'GY'
  };

  const PIECE_TEXT = {
    FU: '歩',
    KY: '香',
    KE: '桂',
    GI: '銀',
    KI: '金',
    KA: '角',
    HI: '飛',
    OU: '王',
    GY: '玉'
  };

  const PROMOTED_TEXT = {
    FU: 'と',
    KY: '成香',
    KE: '成桂',
    GI: '成銀',
    KA: '馬',
    HI: '龍'
  };

  const PROMOTABLE = new Set(['FU','KY','KE','GI','KA','HI']);

  const PIECE_VALUE = {
    FU: 1,
    KY: 3,
    KE: 3,
    GI: 4,
    KI: 5,
    KA: 8,
    HI: 9,
    OU: 100,
    GY: 100
  };

  let board = [];
  let captured = {
    [SENTE]: [],
    [GOTE]: []
  };
  let currentTurn = SENTE;
  let selected = null;
  let selectedDrop = null;
  let lastAiMove = null;
  let moveHighlightOn = true;
  let bannerTimer = null;

  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const capturedSenteEl = document.getElementById('captured-sente-list');
  const capturedGoteEl = document.getElementById('captured-gote-list');
  const toggleMovesEl = document.getElementById('toggle-moves');
  const difficultyEl = document.getElementById('difficulty');
  const moveBannerEl = document.getElementById('move-name-banner');
  const resultOverlayEl = document.getElementById('result-overlay');
  const resultTextEl = document.getElementById('result-text');
  const resultSubEl = document.getElementById('result-sub');
  const restartBtn = document.getElementById('restart-btn');

  function createInitialBoard() {
    board = Array.from({ length: 9 }, () => Array(9).fill(null));

    function placePiece(x, y, type, owner, promoted=false) {
      board[y][x] = { type, owner, promoted };
    }

    // SENTE (下側)
    // 1段目: 香 桂 銀 金 玉 金 銀 桂 香
    placePiece(0, 8, PIECE_TYPES.KY, SENTE);
    placePiece(1, 8, PIECE_TYPES.KE, SENTE);
    placePiece(2, 8, PIECE_TYPES.GI, SENTE);
    placePiece(3, 8, PIECE_TYPES.KI, SENTE);
    placePiece(4, 8, PIECE_TYPES.OU, SENTE);
    placePiece(5, 8, PIECE_TYPES.KI, SENTE);
    placePiece(6, 8, PIECE_TYPES.GI, SENTE);
    placePiece(7, 8, PIECE_TYPES.KE, SENTE);
    placePiece(8, 8, PIECE_TYPES.KY, SENTE);
    // 2段目: 空 角 飛 空 空 空 空 空 空 （角が左、飛が右）
    placePiece(1, 7, PIECE_TYPES.KA, SENTE);
    placePiece(2, 7, PIECE_TYPES.HI, SENTE);
    // 3段目: 歩
    for (let x = 0; x < 9; x++) {
      placePiece(x, 6, PIECE_TYPES.FU, SENTE);
    }

    // GOTE (上側)
    // 1段目: 香 桂 銀 金 玉 金 銀 桂 香
    placePiece(0, 0, PIECE_TYPES.KY, GOTE);
    placePiece(1, 0, PIECE_TYPES.KE, GOTE);
    placePiece(2, 0, PIECE_TYPES.GI, GOTE);
    placePiece(3, 0, PIECE_TYPES.KI, GOTE);
    placePiece(4, 0, PIECE_TYPES.GY, GOTE);
    placePiece(5, 0, PIECE_TYPES.KI, GOTE);
    placePiece(6, 0, PIECE_TYPES.GI, GOTE);
    placePiece(7, 0, PIECE_TYPES.KE, GOTE);
    placePiece(8, 0, PIECE_TYPES.KY, GOTE);
    // 2段目: 空 角 飛 空 空 空 空 空 空 （角が左、飛が右）※相手側から見て
    placePiece(7, 1, PIECE_TYPES.KA, GOTE);
    placePiece(6, 1, PIECE_TYPES.HI, GOTE);
    // 3段目: 歩
    for (let x = 0; x < 9; x++) {
      placePiece(x, 2, PIECE_TYPES.FU, GOTE);
    }

    captured[SENTE] = [];
    captured[GOTE] = [];
    currentTurn = SENTE;
    selected = null;
    selectedDrop = null;
    lastAiMove = null;
  }

  function renderBoard() {
    boardEl.innerHTML = '';
    for (let y = 0; y < 9; y++) {
      for (let x = 0; x < 9; x++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.x = x;
        cell.dataset.y = y;
        if (lastAiMove && lastAiMove.to.x === x && lastAiMove.to.y === y) {
          cell.classList.add('ai-last');
        }
        const piece = board[y][x];
        if (piece) {
          const pieceEl = document.createElement('div');
          pieceEl.className = 'piece ' + (piece.owner === SENTE ? 'sente' : 'gote') + (piece.promoted ? ' promoted' : '');
          const textEl = document.createElement('div');
          textEl.className = 'piece-text';
          textEl.textContent = getPieceDisplayText(piece);
          pieceEl.appendChild(textEl);
          cell.appendChild(pieceEl);
        }
        boardEl.appendChild(cell);
      }
    }
  }

  function renderCaptured() {
    capturedSenteEl.innerHTML = '';
    capturedGoteEl.innerHTML = '';
    const countsS = countCaptured(captured[SENTE]);
    const countsG = countCaptured(captured[GOTE]);

    Object.keys(countsS).forEach(type => {
      const info = countsS[type];
      const el = document.createElement('div');
      el.className = 'captured-piece';
      el.dataset.owner = SENTE;
      el.dataset.type = type;
      el.textContent = getPieceDisplayText({ type, promoted: false, owner: SENTE });
      if (info.count > 1) {
        el.textContent += info.count;
      }
      if (selectedDrop && selectedDrop.owner === SENTE && selectedDrop.type === type) {
        el.classList.add('selected');
      }
      capturedSenteEl.appendChild(el);
    });

    Object.keys(countsG).forEach(type => {
      const info = countsG[type];
      const el = document.createElement('div');
      el.className = 'captured-piece';
      el.dataset.owner = GOTE;
      el.dataset.type = type;
      el.textContent = getPieceDisplayText({ type, promoted: false, owner: GOTE });
      if (info.count > 1) {
        el.textContent += info.count;
      }
      if (selectedDrop && selectedDrop.owner === GOTE && selectedDrop.type === type) {
        el.classList.add('selected');
      }
      capturedGoteEl.appendChild(el);
    });
  }

  function countCaptured(list) {
    const map = {};
    list.forEach(p => {
      const key = p.type;
      if (!map[key]) map[key] = { type: p.type, count: 0 };
      map[key].count++;
    });
    return map;
  }

  function getPieceDisplayText(piece) {
    if (piece.promoted && PROMOTED_TEXT[piece.type]) {
      return PROMOTED_TEXT[piece.type];
    }
    return PIECE_TEXT[piece.type] || '';
  }

  function clearHighlights() {
    document.querySelectorAll('.cell').forEach(c => {
      c.classList.remove('highlight-move', 'selected');
    });
  }

  function getLegalMovesForPiece(x, y, piece, boardState = board) {
    const moves = [];
    const dir = piece.owner === SENTE ? -1 : 1;
    const enemy = piece.owner === SENTE ? GOTE : SENTE;

    function addMove(nx, ny) {
      if (nx < 0 || nx >= 9 || ny < 0 || ny >= 9) return;
      const target = boardState[ny][nx];
      if (!target || target.owner === enemy) {
        moves.push({ x: nx, y: ny });
      }
    }

    function slide(dx, dy) {
      let nx = x + dx;
      let ny = y + dy;
      while (nx >= 0 && nx < 9 && ny >= 0 && ny < 9) {
        const target = boardState[ny][nx];
        if (!target) {
          moves.push({ x: nx, y: ny });
        } else {
          if (target.owner === enemy) {
            moves.push({ x: nx, y: ny });
          }
          break;
        }
        nx += dx;
        ny += dy;
      }
    }

    const promoted = piece.promoted;

    if (piece.type === PIECE_TYPES.FU && !promoted) {
      addMove(x, y + dir);
    } else if (piece.type === PIECE_TYPES.KY && !promoted) {
      slide(0, dir);
    } else if (piece.type === PIECE_TYPES.KE && !promoted) {
      addMove(x - 1, y + 2 * dir);
      addMove(x + 1, y + 2 * dir);
    } else if (piece.type === PIECE_TYPES.GI && !promoted) {
      addMove(x - 1, y + dir);
      addMove(x, y + dir);
      addMove(x + 1, y + dir);
      addMove(x - 1, y - dir);
      addMove(x + 1, y - dir);
    } else if (piece.type === PIECE_TYPES.KI || (promoted && ['FU','KY','KE','GI'].includes(piece.type))) {
      const forward = dir;
      const back = -dir;
      addMove(x, y + forward);
      addMove(x - 1, y + forward);
      addMove(x + 1, y + forward);
      addMove(x - 1, y);
      addMove(x + 1, y);
      addMove(x, y + back);
    } else if (piece.type === PIECE_TYPES.KA && !promoted) {
      slide(1, 1);
      slide(-1, 1);
      slide(1, -1);
      slide(-1, -1);
    } else if (piece.type === PIECE_TYPES.HI && !promoted) {
      slide(1, 0);
      slide(-1, 0);
      slide(0, 1);
      slide(0, -1);
    } else if (piece.type === PIECE_TYPES.OU || piece.type === PIECE_TYPES.GY) {
      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          if (dx === 0 && dy === 0) continue;
          addMove(x + dx, y + dy);
        }
      }
    }

    if (promoted && piece.type === PIECE_TYPES.KA) {
      addMove(x + 1, y);
      addMove(x - 1, y);
      addMove(x, y + 1);
      addMove(x, y - 1);
    }
    if (promoted && piece.type === PIECE_TYPES.HI) {
      addMove(x + 1, y + 1);
      addMove(x - 1, y + 1);
      addMove(x + 1, y - 1);
      addMove(x - 1, y - 1);
    }

    return moves;
  }

  function isInEnemyCamp(y, owner) {
    if (owner === SENTE) {
      return y <= 2;
    } else {
      return y >= 6;
    }
  }

  function shouldPromote(piece, fromY, toY) {
    if (!PROMOTABLE.has(piece.type)) return false;
    if (piece.promoted) return false;
    if (isInEnemyCamp(fromY, piece.owner) || isInEnemyCamp(toY, piece.owner)) {
      return true;
    }
    return false;
  }

  function cloneBoardState(state) {
    return state.map(row => row.map(p => p ? { ...p } : null));
  }

  function applyMove(state, from, to, promote) {
    const newState = cloneBoardState(state);
    const piece = newState[from.y][from.x];
    const target = newState[to.y][to.x];
    let newCaptured = null;
    if (target) {
      newCaptured = { ...target, promoted: false };
      newCaptured.owner = piece.owner;
    }
    newState[from.y][from.x] = null;
    const moved = { ...piece };
    if (promote) moved.promoted = true;
    newState[to.y][to.x] = moved;
    return { board: newState, captured: newCaptured };
  }

  function applyDrop(state, to, pieceType, owner) {
    const newState = cloneBoardState(state);
    newState[to.y][to.x] = { type: pieceType, owner, promoted: false };
    return newState;
  }

  function evaluateBoard(state, perspective) {
    let score = 0;
    for (let y = 0; y < 9; y++) {
      for (let x = 0; x < 9; x++) {
        const p = state[y][x];
        if (!p) continue;
        let val = PIECE_VALUE[p.type] || 0;
        if (p.promoted && PROMOTABLE.has(p.type)) {
          val += 2;
        }
        score += (p.owner === perspective ? val : -val);
      }
    }
    return score;
  }

  function generateAllMoves(state, owner, capturedList) {
    const moves = [];
    for (let y = 0; y < 9; y++) {
      for (let x = 0; x < 9; x++) {
        const p = state[y][x];
        if (!p || p.owner !== owner) continue;
        const legal = getLegalMovesForPiece(x, y, p, state);
        legal.forEach(dest => {
          const promote = shouldPromote(p, y, dest.y);
          moves.push({
            type: 'move',
            from: { x, y },
            to: dest,
            promote
          });
        });
      }
    }
    const counts = countCaptured(capturedList);
    Object.keys(counts).forEach(type => {
      for (let y = 0; y < 9; y++) {
        for (let x = 0; x < 9; x++) {
          if (!state[y][x]) {
            moves.push({
              type: 'drop',
              to: { x, y },
              pieceType: type
            });
          }
        }
      }
    });
    return moves;
  }

  function aiMove() {
    const difficulty = parseInt(difficultyEl.value, 10);
    const depth = difficulty >= 5 ? 2 : 1;
    const randomness = difficulty <= 2 ? 0.5 : difficulty === 3 ? 0.3 : 0.15;

    const allMoves = generateAllMoves(board, GOTE, captured[GOTE]);
    if (allMoves.length === 0) {
      endGame(SENTE);
      return;
    }

    let bestScore = -Infinity;
    let scoredMoves = [];

    allMoves.forEach(move => {
      let newBoard, newCapturedList = [...captured[GOTE]];
      if (move.type === 'move') {
        const res = applyMove(board, move.from, move.to, move.promote);
        newBoard = res.board;
        if (res.captured) {
          newCapturedList.push(res.captured);
        }
      } else {
        newBoard = applyDrop(board, move.to, move.pieceType, GOTE);
        const idx = newCapturedList.findIndex(p => p.type === move.pieceType);
        if (idx >= 0) newCapturedList.splice(idx, 1);
      }

      let score = evaluateBoard(newBoard, GOTE);

      if (depth > 1) {
        const replyMoves = generateAllMoves(newBoard, SENTE, captured[SENTE]);
        let worstReply = Infinity;
        replyMoves.forEach(rm => {
          let replyBoard;
          if (rm.type === 'move') {
            const res2 = applyMove(newBoard, rm.from, rm.to, rm.promote);
            replyBoard = res2.board;
          } else {
            replyBoard = applyDrop(newBoard, rm.to, rm.pieceType, SENTE);
          }
          const s2 = evaluateBoard(replyBoard, GOTE);
          if (s2 < worstReply) worstReply = s2;
        });
        if (replyMoves.length > 0) {
          score = worstReply;
        }
      }

      scoredMoves.push({ move, score });
      if (score > bestScore) bestScore = score;
    });

    const candidates = scoredMoves
      .filter(m => m.score >= bestScore - 2)
      .sort((a, b) => b.score - a.score);

    let chosen;
    if (Math.random() < randomness && candidates.length > 1) {
      const idx = Math.floor(Math.random() * Math.min(4, candidates.length));
      chosen = candidates[idx].move;
    } else {
      chosen = candidates[0].move;
    }

    executeAiMove(chosen);
  }

  function executeAiMove(move) {
    clearHighlights();
    lastAiMove = null;

    if (move.type === 'move') {
      const piece = board[move.from.y][move.from.x];
      const target = board[move.to.y][move.to.x];
      if (target) {
        const cap = { ...target, promoted: false, owner: GOTE };
        captured[GOTE].push(cap);
      }
      board[move.from.y][move.from.x] = null;
      piece.promoted = piece.promoted || shouldPromote(piece, move.from.y, move.to.y);
      board[move.to.y][move.to.x] = piece;
      lastAiMove = { from: move.from, to: move.to };
      const name = formatMoveName(move, piece, GOTE);
      showMoveBanner('相手: ' + name);
      if (piece.type === PIECE_TYPES.OU || piece.type === PIECE_TYPES.GY) {
        // nothing special
      }
      if (target && (target.type === PIECE_TYPES.OU || target.type === PIECE_TYPES.GY)) {
        endGame(GOTE);
        return;
      }
    } else {
      board = applyDrop(board, move.to, move.pieceType, GOTE);
      const idx = captured[GOTE].findIndex(p => p.type === move.pieceType);
      if (idx >= 0) captured[GOTE].splice(idx, 1);
      lastAiMove = { from: null, to: move.to };
      const dummyPiece = { type: move.pieceType, promoted: false };
      const name = formatMoveName(move, dummyPiece, GOTE);
      showMoveBanner('相手: ' + name);
    }

    renderBoard();
    renderCaptured();
    currentTurn = SENTE;
    updateStatus();
  }

  function formatMoveName(move, piece, owner) {
    const file = 9 - move.to.x;
    const rank = move.to.y + 1;
    const pieceText = getPieceDisplayText(piece);
    const prefix = owner === SENTE ? '▲' : '△';
    if (move.type === 'drop') {
      return `${prefix}${file}${rank}${pieceText}打`;
    } else {
      const promo = move.promote || piece.promoted ? '成' : '';
      return `${prefix}${file}${rank}${pieceText}${promo}`;
    }
  }

  function showMoveBanner(text) {
    moveBannerEl.textContent = text;
    moveBannerEl.style.opacity = '1';
    if (bannerTimer) clearTimeout(bannerTimer);
    bannerTimer = setTimeout(() => {
      moveBannerEl.style.opacity = '0';
    }, 2000);
  }

  function updateStatus() {
    statusEl.textContent = currentTurn === SENTE ? 'あなたの手番です' : '相手の手番です';
  }

  function endGame(winner) {
    const youWin = winner === SENTE;
    resultTextEl.textContent = youWin ? '勝利！' : '敗北…';
    resultSubEl.textContent = youWin ? '王を取りました。お見事です。' : '玉を取られてしまいました。もう一局どうぞ。';
    resultOverlayEl.classList.add('show');
  }

  function handleCellClick(e) {
    const cell = e.target.closest('.cell');
    if (!cell) return;
    const x = parseInt(cell.dataset.x, 10);
    const y = parseInt(cell.dataset.y, 10);

    if (currentTurn !== SENTE) return;

    const piece = board[y][x];

    if (selectedDrop) {
      if (!piece) {
        board = applyDrop(board, { x, y }, selectedDrop.type, SENTE);
        const idx = captured[SENTE].findIndex(p => p.type === selectedDrop.type);
        if (idx >= 0) captured[SENTE].splice(idx, 1);
        selectedDrop = null;
        clearHighlights();
        renderBoard();
        renderCaptured();
        if (checkKingCaptured(GOTE)) {
          endGame(SENTE);
          return;
        }
        currentTurn = GOTE;
        updateStatus();
        setTimeout(aiMove, 300);
      }
      return;
    }

    if (selected && selected.x === x && selected.y === y) {
      selected = null;
      clearHighlights();
      return;
    }

    if (selected) {
      const from = { x: selected.x, y: selected.y };
      const movingPiece = board[from.y][from.x];
      const legal = getLegalMovesForPiece(from.x, from.y, movingPiece);
      const isLegal = legal.some(m => m.x === x && m.y === y);
      if (isLegal) {
        const target = board[y][x];
        if (target) {
          const cap = { ...target, promoted: false, owner: SENTE };
          captured[SENTE].push(cap);
        }
        board[from.y][from.x] = null;
        movingPiece.promoted = movingPiece.promoted || shouldPromote(movingPiece, from.y, y);
        board[y][x] = movingPiece;
        const moveObj = { type: 'move', from, to: { x, y }, promote: movingPiece.promoted };
        const name = formatMoveName(moveObj, movingPiece, SENTE);
        showMoveBanner('あなた: ' + name);
        selected = null;
        clearHighlights();
        renderBoard();
        renderCaptured();
        if (target && (target.type === PIECE_TYPES.OU || target.type === PIECE_TYPES.GY)) {
          endGame(SENTE);
          return;
        }
        currentTurn = GOTE;
        updateStatus();
        setTimeout(aiMove, 300);
      } else {
        selected = null;
        clearHighlights();
      }
      return;
    }

    if (piece && piece.owner === SENTE) {
      selected = { x, y };
      selectedDrop = null;
      clearHighlights();
      cell.classList.add('selected');
      if (moveHighlightOn) {
        const legal = getLegalMovesForPiece(x, y, piece);
        legal.forEach(m => {
          const sel = document.querySelector(`.cell[data-x="${m.x}"][data-y="${m.y}"]`);
          if (sel) sel.classList.add('highlight-move');
        });
      }
    }
  }

  function handleCapturedClick(e) {
    const el = e.target.closest('.captured-piece');
    if (!el) return;
    const owner = el.dataset.owner;
    const type = el.dataset.type;
    if (currentTurn !== owner) return;
    if (owner !== SENTE) return;

    if (selectedDrop && selectedDrop.type === type && selectedDrop.owner === owner) {
      selectedDrop = null;
    } else {
      selectedDrop = { owner, type };
      selected = null;
    }
    clearHighlights();
    renderCaptured();
  }

  function checkKingCaptured(owner) {
    for (let y = 0; y < 9; y++) {
      for (let x = 0; x < 9; x++) {
        const p = board[y][x];
        if (!p) continue;
        if (owner === SENTE && p.owner === SENTE && (p.type === PIECE_TYPES.OU)) return false;
        if (owner === GOTE && p.owner === GOTE && (p.type === PIECE_TYPES.GY)) return false;
      }
    }
    return true;
  }

  boardEl.addEventListener('click', handleCellClick);
  capturedSenteEl.addEventListener('click', handleCapturedClick);
  capturedGoteEl.addEventListener('click', handleCapturedClick);
  toggleMovesEl.addEventListener('change', () => {
    moveHighlightOn = toggleMovesEl.checked;
    clearHighlights();
  });
  restartBtn.addEventListener('click', () => {
    resultOverlayEl.classList.remove('show');
    createInitialBoard();
    renderBoard();
    renderCaptured();
    updateStatus();
  });

  createInitialBoard();
  renderBoard();
  renderCaptured();
  updateStatus();
})();
</script>
</body>
</html>
