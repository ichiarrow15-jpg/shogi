<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シンプル将棋</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --board-size: min(90vw, 90vh);
    --cell-size: calc(var(--board-size) / 9);
    --board-bg: #f5e4c3;
    --cell-border: #444;
    --highlight: rgba(255, 215, 0, 0.6);
    --last-move: rgba(135, 206, 250, 0.4);
    --player-color: #222;
    --ai-color: #b22222;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #222;
    color: #eee;
    display: flex;
    justify-content: center;
  }
  .wrapper {
    width: 100%;
    max-width: 900px;
    padding: 10px;
  }
  .top-bar {
    position: relative;
    margin-bottom: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: space-between;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  select, button {
    padding: 4px 8px;
    font-size: 14px;
  }
  .toggle-label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
  }
  .toggle-label input {
    transform: scale(1.1);
  }
  .move-banner {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: -40px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .move-banner.show {
    opacity: 1;
  }

  .main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .captured-row {
    display: flex;
    justify-content: space-between;
    width: 100%;
    font-size: 13px;
  }
  .captured-area {
    flex: 1;
    min-height: 32px;
    border: 1px solid #555;
    padding: 2px;
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    background: #111;
  }
  .captured-label {
    width: 70px;
    text-align: center;
    font-size: 12px;
  }
  .piece-chip {
    border: 1px solid #777;
    padding: 1px 3px;
    border-radius: 3px;
    cursor: pointer;
    background: #333;
  }

  .board-wrapper {
    position: relative;
    width: var(--board-size);
    height: var(--board-size);
    background: #333;
    padding: 4px;
    border-radius: 6px;
  }
  .board {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-template-rows: repeat(9, 1fr);
    background: var(--board-bg);
    border: 2px solid #000;
  }
  .cell {
    border: 1px solid var(--cell-border);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--cell-size) * 0.5);
    user-select: none;
  }
  .cell.highlight {
    background: var(--highlight);
  }
  .cell.last-move {
    box-shadow: inset 0 0 0 3px var(--last-move);
  }
  .piece {
    width: 80%;
    height: 80%;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    cursor: pointer;
    background: #fdf5e6;
    border: 2px solid #333;
    writing-mode: vertical-rl;
    text-orientation: upright;
  }
  .piece.player {
    color: var(--player-color);
  }
  .piece.ai {
    color: var(--ai-color);
    transform: rotate(180deg);
  }
  .piece.promoted {
    color: #d2691e;
  }

  .status {
    margin-top: 6px;
    font-size: 13px;
    text-align: center;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 20;
  }
  .overlay.show {
    display: flex;
  }
  .overlay-content {
    text-align: center;
    color: #fff;
    font-size: 32px;
    padding: 20px 30px;
    border-radius: 8px;
    background: linear-gradient(135deg, #444, #111);
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
  }
  .overlay-content.win {
    border: 3px solid #ffd700;
  }
  .overlay-content.lose {
    border: 3px solid #ff4500;
  }
  .overlay-content button {
    margin-top: 16px;
    font-size: 16px;
  }

  @media (max-width: 480px) {
    .top-bar {
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    .move-banner {
      top: -32px;
      font-size: 11px;
    }
    .captured-label {
      width: 60px;
      font-size: 11px;
    }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="top-bar">
    <div class="controls">
      <label>難易度:
        <select id="difficulty">
          <option value="1">1（やさしい）</option>
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5（むずかしい）</option>
        </select>
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="highlightToggle" checked>
        駒のいける方向オン/オフ
      </label>
      <button id="restartBtn">リスタート</button>
    </div>
    <div id="moveBanner" class="move-banner"></div>
  </div>

  <div class="main">
    <div class="captured-row">
      <div class="captured-label">後手持ち駒</div>
      <div id="capturedAI" class="captured-area"></div>
    </div>

    <div class="board-wrapper">
      <div id="board" class="board"></div>
    </div>

    <div class="captured-row">
      <div class="captured-label">先手持ち駒</div>
      <div id="capturedPlayer" class="captured-area"></div>
    </div>

    <div id="status" class="status"></div>
  </div>

  <div id="overlay" class="overlay">
    <div id="overlayContent" class="overlay-content">
      <div id="overlayText"></div>
      <button id="overlayRestart">もう一度</button>
    </div>
  </div>
</div>

<script>
  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const capturedPlayerEl = document.getElementById('capturedPlayer');
  const capturedAIEl = document.getElementById('capturedAI');
  const difficultyEl = document.getElementById('difficulty');
  const highlightToggleEl = document.getElementById('highlightToggle');
  const moveBannerEl = document.getElementById('moveBanner');
  const overlayEl = document.getElementById('overlay');
  const overlayContentEl = document.getElementById('overlayContent');
  const overlayTextEl = document.getElementById('overlayText');
  const overlayRestartBtn = document.getElementById('overlayRestart');
  const restartBtn = document.getElementById('restartBtn');

  const PIECES = {
    FU: '歩', KY: '香', KE: '桂', GI: '銀', KI: '金',
    OU: '王', GY: '玉', KA: '角', HI: '飛',
    TO: 'と', NY: '成香', NK: '成桂', NG: '成銀', UM: '馬', RY: '龍'
  };

  let board = [];
  let playerCaptures = [];
  let aiCaptures = [];
  let currentPlayer = 'player'; // 'player' or 'ai'
  let selected = null; // {r,c, fromHand:boolean, pieceObj}
  let highlightCells = [];
  let lastMove = null; // {from,to}
  let gameOver = false;
  let bannerTimeout = null;

  function createInitialBoard() {
    const emptyRow = () => Array(9).fill(null);
    board = [];
    for (let r = 0; r < 9; r++) board.push(emptyRow());

    // 上側（AI：後手、玉）
    board[0] = [
      makePiece('KY', 'ai'), makePiece('KE', 'ai'), makePiece('GI', 'ai'),
      makePiece('KI', 'ai'), makePiece('GY', 'ai'), makePiece('KI', 'ai'),
      makePiece('GI', 'ai'), makePiece('KE', 'ai'), makePiece('KY', 'ai')
    ];
    board[1][1] = makePiece('HI', 'ai'); // 飛（右）
    board[1][7] = makePiece('KA', 'ai'); // 角（左）
    for (let c = 0; c < 9; c++) board[2][c] = makePiece('FU', 'ai');

    // 下側（プレイヤー：先手、王）
    for (let c = 0; c < 9; c++) board[6][c] = makePiece('FU', 'player');
    board[7][1] = makePiece('KA', 'player'); // 角（左）
    board[7][7] = makePiece('HI', 'player'); // 飛（右）
    board[8] = [
      makePiece('KY', 'player'), makePiece('KE', 'player'), makePiece('GI', 'player'),
      makePiece('KI', 'player'), makePiece('OU', 'player'), makePiece('KI', 'player'),
      makePiece('GI', 'player'), makePiece('KE', 'player'), makePiece('KY', 'player')
    ];

    playerCaptures = [];
    aiCaptures = [];
    currentPlayer = 'player';
    selected = null;
    highlightCells = [];
    lastMove = null;
    gameOver = false;
    statusEl.textContent = 'あなたの手番（先手）';
  }

  function makePiece(type, owner, promoted = false) {
    return { type, owner, promoted };
  }

  function renderBoard() {
    boardEl.innerHTML = '';
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.r = r;
        cell.dataset.c = c;

        if (lastMove && lastMove.to.r === r && lastMove.to.c === c) {
          cell.classList.add('last-move');
        }

        if (highlightCells.some(p => p.r === r && p.c === c)) {
          cell.classList.add('highlight');
        }

        const piece = board[r][c];
        if (piece) {
          const pieceEl = document.createElement('div');
          pieceEl.className = 'piece ' + (piece.owner === 'player' ? 'player' : 'ai');
          if (piece.promoted) pieceEl.classList.add('promoted');
          pieceEl.textContent = getPieceChar(piece);
          pieceEl.addEventListener('click', (e) => {
            e.stopPropagation();
            onPieceClick(r, c);
          });
          cell.appendChild(pieceEl);
        }

        cell.addEventListener('click', () => onCellClick(r, c));
        boardEl.appendChild(cell);
      }
    }
    renderCaptured();
  }

  function renderCaptured() {
    capturedPlayerEl.innerHTML = '';
    capturedAIEl.innerHTML = '';

    const groupPieces = (arr) => {
      const map = {};
      arr.forEach(p => {
        const key = p.type;
        map[key] = (map[key] || 0) + 1;
      });
      return map;
    };

    const playerMap = groupPieces(playerCaptures);
    const aiMap = groupPieces(aiCaptures);

    Object.keys(playerMap).forEach(type => {
      const chip = document.createElement('div');
      chip.className = 'piece-chip';
      chip.textContent = PIECES[type] + '×' + playerMap[type];
      chip.addEventListener('click', () => onHandPieceClick('player', type));
      capturedPlayerEl.appendChild(chip);
    });

    Object.keys(aiMap).forEach(type => {
      const chip = document.createElement('div');
      chip.className = 'piece-chip';
      chip.textContent = PIECES[type] + '×' + aiMap[type];
      capturedAIEl.appendChild(chip);
    });
  }

  function getPieceChar(piece) {
    if (piece.promoted) {
      switch (piece.type) {
        case 'FU': return PIECES.TO;
        case 'KY': return PIECES.NY;
        case 'KE': return PIECES.NK;
        case 'GI': return PIECES.NG;
        case 'KA': return PIECES.UM;
        case 'HI': return PIECES.RY;
      }
    }
    return PIECES[piece.type];
  }

  function onPieceClick(r, c) {
    if (gameOver) return;
    const piece = board[r][c];
    if (!piece) return;
    if (piece.owner !== currentPlayer) {
      if (selected && !selected.fromHand) {
        tryMove(selected.r, selected.c, r, c);
      }
      return;
    }
    if (selected && !selected.fromHand && selected.r === r && selected.c === c) {
      selected = null;
      highlightCells = [];
      renderBoard();
      return;
    }
    selected = { r, c, fromHand: false, pieceObj: piece };
    updateHighlightsForSelection();
    renderBoard();
  }

  function onCellClick(r, c) {
    if (gameOver) return;
    if (selected) {
      if (selected.fromHand) {
        tryDrop(selected.owner, selected.type, r, c);
      } else {
        tryMove(selected.r, selected.c, r, c);
      }
    }
  }

  function onHandPieceClick(owner, type) {
    if (gameOver) return;
    if (owner !== 'player') return;
    if (selected && selected.fromHand && selected.type === type) {
      selected = null;
      highlightCells = [];
      renderBoard();
      return;
    }
    selected = { fromHand: true, owner, type };
    updateHighlightsForSelection();
    renderBoard();
  }

  function updateHighlightsForSelection() {
    highlightCells = [];
    if (!highlightToggleEl.checked || !selected) return;

    if (selected.fromHand) {
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          if (!board[r][c] && canDrop(selected.owner, selected.type, r, c)) {
            highlightCells.push({ r, c });
          }
        }
      }
    } else {
      const moves = getLegalMovesForPiece(selected.r, selected.c, board[selected.r][selected.c]);
      highlightCells = moves.map(m => ({ r: m.r, c: m.c }));
    }
  }

  function tryMove(fr, fc, tr, tc) {
    const piece = board[fr][fc];
    if (!piece || piece.owner !== currentPlayer) return;
    const legalMoves = getLegalMovesForPiece(fr, fc, piece);
    if (!legalMoves.some(m => m.r === tr && m.c === tc)) return;

    const move = { from: { r: fr, c: fc }, to: { r: tr, c: tc } };
    const captured = board[tr][tc];

    // 移動
    board[tr][tc] = { ...piece };
    board[fr][fc] = null;

    // 成り判定
    const inZone = (owner, r) => owner === 'player' ? r <= 2 : r >= 6;
    const wasInZone = inZone(piece.owner, fr) || inZone(piece.owner, tr);
    if (canPromote(piece.type) && wasInZone && !piece.promoted) {
      const auto = mustPromote(piece.owner, piece.type, tr);
      if (auto || confirm('成りますか？')) {
        board[tr][tc].promoted = true;
      }
    }

    // 持ち駒処理
    if (captured) {
      const baseType = demoteType(captured.type);
      const capPiece = makePiece(baseType, currentPlayer, false);
      if (currentPlayer === 'player') playerCaptures.push(capPiece);
      else aiCaptures.push(capPiece);
    }

    lastMove = move;
    selected = null;
    highlightCells = [];
    renderBoard();
    showMoveName(currentPlayer, piece, move, captured);

    if (isKingCaptured('ai')) {
      endGame(true);
      return;
    }
    if (isKingCaptured('player')) {
      endGame(false);
      return;
    }

    currentPlayer = currentPlayer === 'player' ? 'ai' : 'player';
    statusEl.textContent = currentPlayer === 'player' ? 'あなたの手番（先手）' : '相手の手番（後手）';

    if (currentPlayer === 'ai' && !gameOver) {
      setTimeout(aiTurn, 300);
    }
  }

  function tryDrop(owner, type, r, c) {
    if (owner !== currentPlayer) return;
    if (board[r][c]) return;
    if (!canDrop(owner, type, r, c)) return;

    const capArr = owner === 'player' ? playerCaptures : aiCaptures;
    const idx = capArr.findIndex(p => p.type === type);
    if (idx === -1) return;
    capArr.splice(idx, 1);

    board[r][c] = makePiece(type, owner, false);

    const move = { from: null, to: { r, c } };
    lastMove = move;
    selected = null;
    highlightCells = [];
    renderBoard();
    showDropName(owner, type, r, c);

    if (isKingCaptured('ai')) {
      endGame(true);
      return;
    }
    if (isKingCaptured('player')) {
      endGame(false);
      return;
    }

    currentPlayer = currentPlayer === 'player' ? 'ai' : 'player';
    statusEl.textContent = currentPlayer === 'player' ? 'あなたの手番（先手）' : '相手の手番（後手）';

    if (currentPlayer === 'ai' && !gameOver) {
      setTimeout(aiTurn, 300);
    }
  }

  function canPromote(type) {
    return ['FU', 'KY', 'KE', 'GI', 'KA', 'HI'].includes(type);
  }

  function mustPromote(owner, type, r) {
    if (owner === 'player') {
      if (type === 'FU' || type === 'KY') return r === 0;
      if (type === 'KE') return r <= 1;
    } else {
      if (type === 'FU' || type === 'KY') return r === 8;
      if (type === 'KE') return r >= 7;
    }
    return false;
  }

  function demoteType(type) {
    switch (type) {
      case 'TO': return 'FU';
      case 'NY': return 'KY';
      case 'NK': return 'KE';
      case 'NG': return 'GI';
      case 'UM': return 'KA';
      case 'RY': return 'HI';
      default: return type;
    }
  }

  function canDrop(owner, type, r, c) {
    if (board[r][c]) return false;

    // 2歩禁止
    if (type === 'FU') {
      for (let rr = 0; rr < 9; rr++) {
        const p = board[rr][c];
        if (p && p.owner === owner && p.type === 'FU' && !p.promoted) return false;
      }
      if (owner === 'player' && r === 0) return false;
      if (owner === 'ai' && r === 8) return false;
    }
    if (type === 'KY') {
      if (owner === 'player' && r === 0) return false;
      if (owner === 'ai' && r === 8) return false;
    }
    if (type === 'KE') {
      if (owner === 'player' && r <= 1) return false;
      if (owner === 'ai' && r >= 7) return false;
    }
    return true;
  }

  function getLegalMovesForPiece(r, c, piece) {
    if (!piece) return [];
    const moves = [];
    const dir = piece.owner === 'player' ? -1 : 1;

    const addMove = (nr, nc, slide = false) => {
      while (true) {
        if (nr < 0 || nr > 8 || nc < 0 || nc > 8) break;
        const target = board[nr][nc];
        if (target && target.owner === piece.owner) break;
        moves.push({ r: nr, c: nc });
        if (target || !slide) break;
        nr += (nr - r);
        nc += (nc - c);
      }
    };

    const addSlide = (dr, dc) => {
      let nr = r + dr, nc = c + dc;
      while (nr >= 0 && nr < 9 && nc >= 0 && nc < 9) {
        const target = board[nr][nc];
        if (target && target.owner === piece.owner) break;
        moves.push({ r: nr, c: nc });
        if (target) break;
        nr += dr;
        nc += dc;
      }
    };

    const isPromoted = piece.promoted;

    if (piece.type === 'FU' && !isPromoted) {
      const nr = r + dir;
      if (nr >= 0 && nr < 9) {
        const target = board[nr][c];
        if (!target || target.owner !== piece.owner) moves.push({ r: nr, c });
      }
    } else if (piece.type === 'KY' && !isPromoted) {
      addSlide(dir, 0);
    } else if (piece.type === 'KE' && !isPromoted) {
      const nr1 = r + 2 * dir;
      const c1 = c - 1;
      const c2 = c + 1;
      if (nr1 >= 0 && nr1 < 9) {
        if (c1 >= 0) {
          const t = board[nr1][c1];
          if (!t || t.owner !== piece.owner) moves.push({ r: nr1, c: c1 });
        }
        if (c2 < 9) {
          const t = board[nr1][c2];
          if (!t || t.owner !== piece.owner) moves.push({ r: nr1, c: c2 });
        }
      }
    } else if (piece.type === 'GI' && !isPromoted) {
      const dirs = [
        { dr: dir, dc: -1 }, { dr: dir, dc: 0 }, { dr: dir, dc: 1 },
        { dr: -dir, dc: -1 }, { dr: -dir, dc: 1 }
      ];
      dirs.forEach(d => {
        const nr = r + d.dr, nc = c + d.dc;
        if (nr < 0 || nr > 8 || nc < 0 || nc > 8) return;
        const t = board[nr][nc];
        if (!t || t.owner !== piece.owner) moves.push({ r: nr, c: nc });
      });
    } else if (piece.type === 'KA' && !isPromoted) {
      addSlide(1, 1); addSlide(1, -1); addSlide(-1, 1); addSlide(-1, -1);
    } else if (piece.type === 'HI' && !isPromoted) {
      addSlide(1, 0); addSlide(-1, 0); addSlide(0, 1); addSlide(0, -1);
    } else if (piece.type === 'OU' || piece.type === 'GY' ||
               (isPromoted && ['FU','KY','KE','GI'].includes(piece.type))) {
      const dirs = [
        { dr: -1, dc: 0 }, { dr: 1, dc: 0 }, { dr: 0, dc: -1 }, { dr: 0, dc: 1 },
        { dr: -1, dc: -1 }, { dr: -1, dc: 1 }, { dr: 1, dc: -1 }, { dr: 1, dc: 1 }
      ];
      dirs.forEach(d => {
        const nr = r + d.dr, nc = c + d.dc;
        if (nr < 0 || nr > 8 || nc < 0 || nc > 8) return;
        const t = board[nr][nc];
        if (!t || t.owner !== piece.owner) moves.push({ r: nr, c: nc });
      });
    } else if (isPromoted && piece.type === 'KA') {
      addSlide(1, 1); addSlide(1, -1); addSlide(-1, 1); addSlide(-1, -1);
      const dirs = [
        { dr: -1, dc: 0 }, { dr: 1, dc: 0 }, { dr: 0, dc: -1 }, { dr: 0, dc: 1 }
      ];
      dirs.forEach(d => {
        const nr = r + d.dr, nc = c + d.dc;
        if (nr < 0 || nr > 8 || nc < 0 || nc > 8) return;
        const t = board[nr][nc];
        if (!t || t.owner !== piece.owner) moves.push({ r: nr, c: nc });
      });
    } else if (isPromoted && piece.type === 'HI') {
      addSlide(1, 0); addSlide(-1, 0); addSlide(0, 1); addSlide(0, -1);
      const dirs = [
        { dr: -1, dc: -1 }, { dr: -1, dc: 1 }, { dr: 1, dc: -1 }, { dr: 1, dc: 1 }
      ];
      dirs.forEach(d => {
        const nr = r + d.dr, nc = c + d.dc;
        if (nr < 0 || nr > 8 || nc < 0 || nc > 8) return;
        const t = board[nr][nc];
        if (!t || !t.owner || t.owner !== piece.owner) moves.push({ r: nr, c: nc });
      });
    }

    return moves;
  }

  function isKingCaptured(owner) {
    const kingType = owner === 'player' ? 'OU' : 'GY';
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        const p = board[r][c];
        if (p && p.owner === owner && p.type === kingType) return false;
      }
    }
    return true;
  }

  function coordToNotation(r, c, owner) {
    const file = 9 - c;
    const rank = owner === 'player' ? (9 - r) : (r + 1);
    return `${file}${rank}`;
  }

  function showMoveName(owner, piece, move, captured) {
    const side = owner === 'player' ? '▲' : '△';
    const name = getPieceChar(piece);
    const to = coordToNotation(move.to.r, move.to.c, owner);
    const capText = captured ? ' 取' : '';
    const text = `${side} ${name} ${to}${capText}`;
    showBanner(text);
  }

  function showDropName(owner, type, r, c) {
    const side = owner === 'player' ? '▲' : '△';
    const name = PIECES[type];
    const to = coordToNotation(r, c, owner);
    const text = `${side} ${name} 打 ${to}`;
    showBanner(text);
  }

  function showBanner(text) {
    moveBannerEl.textContent = text;
    moveBannerEl.classList.add('show');
    if (bannerTimeout) clearTimeout(bannerTimeout);
    bannerTimeout = setTimeout(() => {
      moveBannerEl.classList.remove('show');
    }, 2000);
  }

  function endGame(playerWin) {
    gameOver = true;
    overlayTextEl.textContent = playerWin ? 'あなたの勝ち！' : 'あなたの負け…';
    overlayContentEl.classList.toggle('win', playerWin);
    overlayContentEl.classList.toggle('lose', !playerWin);
    overlayEl.classList.add('show');
    statusEl.textContent = playerWin ? '勝利！' : '敗北…';
  }

  function cloneBoardState() {
    return {
      board: board.map(row => row.map(p => p ? { ...p } : null)),
      playerCaptures: playerCaptures.map(p => ({ ...p })),
      aiCaptures: aiCaptures.map(p => ({ ...p })),
      currentPlayer
    };
  }

  function restoreBoardState(state) {
    board = state.board.map(row => row.map(p => p ? { ...p } : null));
    playerCaptures = state.playerCaptures.map(p => ({ ...p }));
    aiCaptures = state.aiCaptures.map(p => ({ ...p }));
    currentPlayer = state.currentPlayer;
  }

  function evaluateBoard() {
    const values = {
      FU: 1, KY: 3, KE: 3, GI: 4, KI: 5,
      KA: 8, HI: 9, OU: 1000, GY: 1000,
      TO: 5, NY: 5, NK: 5, NG: 5, UM: 11, RY: 12
    };
    let score = 0;
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        const p = board[r][c];
        if (!p) continue;
        const t = getPieceChar(p);
        const key = Object.keys(PIECES).find(k => PIECES[k] === t) || p.type;
        const v = values[key] || 0;
        score += p.owner === 'player' ? v : -v;
      }
    }
    playerCaptures.forEach(p => {
      const v = values[p.type] || 0;
      score += v * 0.8;
    });
    aiCaptures.forEach(p => {
      const v = values[p.type] || 0;
      score -= v * 0.8;
    });
    return score;
  }

  function generateAllMoves(owner) {
    const moves = [];
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        const p = board[r][c];
        if (!p || p.owner !== owner) continue;
        const legal = getLegalMovesForPiece(r, c, p);
        legal.forEach(m => {
          moves.push({
            type: 'move',
            from: { r, c },
            to: { r: m.r, c: m.c },
            piece: p
          });
        });
      }
    }
    const caps = owner === 'player' ? playerCaptures : aiCaptures;
    const uniqueTypes = [...new Set(caps.map(p => p.type))];
    uniqueTypes.forEach(type => {
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          if (!board[r][c] && canDrop(owner, type, r, c)) {
            moves.push({
              type: 'drop',
              dropType: type,
              to: { r, c }
            });
          }
        }
      }
    });
    return moves;
  }

  function applyMoveObj(move, owner) {
    if (move.type === 'move') {
      const { from, to } = move;
      const piece = board[from.r][from.c];
      const captured = board[to.r][to.c];
      board[to.r][to.c] = { ...piece };
      board[from.r][from.c] = null;

      const inZone = (o, r) => o === 'player' ? r <= 2 : r >= 6;
      const wasInZone = inZone(piece.owner, from.r) || inZone(piece.owner, to.r);
      if (canPromote(piece.type) && wasInZone && !piece.promoted) {
        if (mustPromote(piece.owner, piece.type, to.r)) {
          board[to.r][to.c].promoted = true;
        }
      }

      if (captured) {
        const baseType = demoteType(captured.type);
        const capPiece = makePiece(baseType, owner, false);
        if (owner === 'player') playerCaptures.push(capPiece);
        else aiCaptures.push(capPiece);
      }
    } else {
      const caps = owner === 'player' ? playerCaptures : aiCaptures;
      const idx = caps.findIndex(p => p.type === move.dropType);
      if (idx !== -1) caps.splice(idx, 1);
      board[move.to.r][move.to.c] = makePiece(move.dropType, owner, false);
    }
  }

  function aiTurn() {
    if (gameOver) return;
    const owner = 'ai';
    const moves = generateAllMoves(owner);
    if (moves.length === 0) {
      endGame(true);
      return;
    }

    const diff = parseInt(difficultyEl.value, 10);
    let bestScore = Infinity;
    let bestMoves = [];

    moves.forEach(m => {
      const state = cloneBoardState();
      applyMoveObj(m, owner);
      const score = evaluateBoard();
      restoreBoardState(state);

      let adjusted = score;
      if (m.type === 'move' && board[m.to?.r]?.[m.to?.c]) {
        adjusted -= 1;
      }

      if (adjusted < bestScore) {
        bestScore = adjusted;
        bestMoves = [m];
      } else if (adjusted === bestScore) {
        bestMoves.push(m);
      }
    });

    let chosen;
    if (diff <= 2) {
      const pool = diff === 1 ? moves : bestMoves.concat(moves).slice(0, Math.max(5, bestMoves.length));
      chosen = pool[Math.floor(Math.random() * pool.length)];
    } else if (diff === 3) {
      const pool = bestMoves.length > 0 ? bestMoves : moves;
      chosen = pool[Math.floor(Math.random() * pool.length)];
    } else {
      chosen = bestMoves[Math.floor(Math.random() * bestMoves.length)];
    }

    if (!chosen) chosen = moves[Math.floor(Math.random() * moves.length)];

    if (chosen.type === 'move') {
      const piece = board[chosen.from.r][chosen.from.c];
      const captured = board[chosen.to.r][chosen.to.c];
      tryMove(chosen.from.r, chosen.from.c, chosen.to.r, chosen.to.c);
    } else {
      tryDrop(owner, chosen.dropType, chosen.to.r, chosen.to.c);
    }
  }

  restartBtn.addEventListener('click', () => {
    overlayEl.classList.remove('show');
    createInitialBoard();
    renderBoard();
  });

  overlayRestartBtn.addEventListener('click', () => {
    overlayEl.classList.remove('show');
    createInitialBoard();
    renderBoard();
  });

  highlightToggleEl.addEventListener('change', () => {
    updateHighlightsForSelection();
    renderBoard();
  });

  createInitialBoard();
  renderBoard();
</script>
</body>
</html>
