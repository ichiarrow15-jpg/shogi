<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シンプル将棋</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --board-size: min(90vw, 540px);
    --cell-size: calc(var(--board-size) / 9);
    --board-bg: #f4e2b8;
    --cell-border: #8b6b3f;
    --highlight-move: rgba(255, 230, 120, 0.8);
    --highlight-select: rgba(120, 190, 255, 0.6);
    --banner-bg: rgba(0, 0, 0, 0.8);
    --banner-text: #fff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
  }
  .wrapper {
    width: 100%;
    max-width: 640px;
    padding: 8px;
  }
  .top-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .top-bar label {
    font-size: 12px;
    white-space: nowrap;
  }
  select, button {
    font-size: 12px;
    padding: 4px 6px;
  }
  .toggle-label {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
  }
  .banner {
    position: fixed;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--banner-bg);
    color: var(--banner-text);
    padding: 6px 12px;
    border-radius: 16px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    z-index: 1000;
  }
  .banner.show {
    opacity: 1;
  }
  .board-container {
    margin: 0 auto;
    width: var(--board-size);
    height: var(--board-size);
    background: var(--board-bg);
    border: 3px solid #8b6b3f;
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-template-rows: repeat(9, 1fr);
  }
  .cell {
    border: 1px solid var(--cell-border);
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--cell-size) * 0.6);
    user-select: none;
  }
  .cell.highlight-move {
    background: var(--highlight-move);
  }
  .cell.highlight-select {
    background: var(--highlight-select);
  }
  .piece {
    width: 80%;
    height: 80%;
    border-radius: 6px;
    background: #fdf5d0;
    border: 1px solid #b08a4a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .piece.sente {
    color: #222;
  }
  .piece.gote {
    color: #222;
    transform: rotate(180deg);
  }
  .piece.promoted {
    color: #b40000;
  }
  .hands {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    gap: 8px;
  }
  .hand {
    flex: 1;
    background: #fff;
    border-radius: 6px;
    border: 1px solid #ccc;
    padding: 4px;
    min-height: 40px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
  }
  .hand-title {
    font-size: 11px;
    margin-bottom: 2px;
    width: 100%;
  }
  .hand-piece {
    font-size: 14px;
    padding: 2px 4px;
    border-radius: 4px;
    border: 1px solid #b08a4a;
    background: #fdf5d0;
    cursor: pointer;
  }
  .hand-piece.selected {
    outline: 2px solid #2b7cff;
  }
  .status-bar {
    margin-top: 6px;
    font-size: 13px;
    text-align: center;
  }
  .result-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 900;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .result-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .result-box {
    background: #fff;
    padding: 16px 24px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    animation: pop 0.35s ease-out;
  }
  .result-title {
    font-size: 22px;
    margin-bottom: 8px;
  }
  .result-msg {
    font-size: 14px;
    margin-bottom: 12px;
  }
  .result-box button {
    font-size: 14px;
    padding: 6px 12px;
  }
  @keyframes pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
<div class="banner" id="moveBanner"></div>
<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-msg" id="resultMsg"></div>
    <button id="restartBtn">もう一度</button>
  </div>
</div>
<div class="wrapper">
  <div class="top-bar">
    <label>
      難易度:
      <select id="difficulty">
        <option value="1">1（やさしい）</option>
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="4">4</option>
        <option value="5">5（つよい）</option>
      </select>
    </label>
    <label class="toggle-label">
      <input type="checkbox" id="highlightToggle" checked>
      駒のいける方向
    </label>
    <button id="resetBtn">リセット</button>
  </div>

  <div class="board-container" id="board"></div>

  <div class="hands">
    <div class="hand" id="senteHand">
      <div class="hand-title">先手の持ち駒</div>
    </div>
    <div class="hand" id="goteHand">
      <div class="hand-title">後手の持ち駒</div>
    </div>
  </div>

  <div class="status-bar" id="status">あなた（先手）の番です</div>
</div>

<script>
  // --- 基本データ ---
  const SENTE = 'S';
  const GOTE = 'G';

  const PIECE_TYPES = {
    FU: 'FU', KY: 'KY', KE: 'KE', GI: 'GI',
    KI: 'KI', KA: 'KA', HI: 'HI', OU: 'OU', GY: 'GY'
  };

  const PIECE_LABEL = {
    FU: '歩', KY: '香', KE: '桂', GI: '銀',
    KI: '金', KA: '角', HI: '飛', OU: '王', GY: '玉'
  };

  const PROMOTED_LABEL = {
    FU: 'と', KY: '成香', KE: '成桂', GI: '成銀',
    KA: '馬', HI: '龍'
  };

  const PROMOTABLE = new Set(['FU','KY','KE','GI','KA','HI']);

  const PIECE_VALUE = {
    FU: 1, KY: 3, KE: 3, GI: 4, KI: 5,
    KA: 8, HI: 9, OU: 100, GY: 100
  };

  const BOARD_SIZE = 9;

  let board = [];
  let hands = {
    [SENTE]: {},
    [GOTE]: {}
  };

  let currentTurn = SENTE;
  let selected = null; // {x,y} or {hand:true,type,owner}
  let legalMoves = [];
  let highlightOn = true;
  let gameOver = false;
  let bannerTimer = null;

  const boardEl = document.getElementById('board');
  const senteHandEl = document.getElementById('senteHand');
  const goteHandEl = document.getElementById('goteHand');
  const statusEl = document.getElementById('status');
  const bannerEl = document.getElementById('moveBanner');
  const resultOverlay = document.getElementById('resultOverlay');
  const resultTitle = document.getElementById('resultTitle');
  const resultMsg = document.getElementById('resultMsg');
  const restartBtn = document.getElementById('restartBtn');

  document.getElementById('highlightToggle').addEventListener('change', e => {
    highlightOn = e.target.checked;
    render();
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    initGame();
  });
  restartBtn.addEventListener('click', () => {
    resultOverlay.classList.remove('show');
    initGame();
  });

  // --- 初期配置 ---
  function initBoard() {
    board = Array.from({length: BOARD_SIZE}, () =>
      Array.from({length: BOARD_SIZE}, () => null)
    );

    // 先手側（下）
    // 9段目（y=8）
    board[0][8] = createPiece(SENTE, PIECE_TYPES.KY);
    board[1][8] = createPiece(SENTE, PIECE_TYPES.KE);
    board[2][8] = createPiece(SENTE, PIECE_TYPES.GI);
    board[3][8] = createPiece(SENTE, PIECE_TYPES.KI);
    board[4][8] = createPiece(SENTE, PIECE_TYPES.OU); // 王
    board[5][8] = createPiece(SENTE, PIECE_TYPES.KI);
    board[6][8] = createPiece(SENTE, PIECE_TYPES.GI);
    board[7][8] = createPiece(SENTE, PIECE_TYPES.KE);
    board[8][8] = createPiece(SENTE, PIECE_TYPES.KY);
    // 8段目（y=7）
    board[1][7] = createPiece(SENTE, PIECE_TYPES.HI); // 飛（右）
    board[7][7] = createPiece(SENTE, PIECE_TYPES.KA); // 角（左）
    // 7段目（y=6）歩
    for (let x = 0; x < 9; x++) {
      board[x][6] = createPiece(SENTE, PIECE_TYPES.FU);
    }

    // 後手側（上）
    // 1段目（y=0）
    board[0][0] = createPiece(GOTE, PIECE_TYPES.KY);
    board[1][0] = createPiece(GOTE, PIECE_TYPES.KE);
    board[2][0] = createPiece(GOTE, PIECE_TYPES.GI);
    board[3][0] = createPiece(GOTE, PIECE_TYPES.KI);
    board[4][0] = createPiece(GOTE, PIECE_TYPES.GY); // 玉
    board[5][0] = createPiece(GOTE, PIECE_TYPES.KI);
    board[6][0] = createPiece(GOTE, PIECE_TYPES.GI);
    board[7][0] = createPiece(GOTE, PIECE_TYPES.KE);
    board[8][0] = createPiece(GOTE, PIECE_TYPES.KY);
    // 2段目（y=1）
    board[7][1] = createPiece(GOTE, PIECE_TYPES.HI); // 飛（右）
    board[1][1] = createPiece(GOTE, PIECE_TYPES.KA); // 角（左）
    // 3段目（y=2）歩
    for (let x = 0; x < 9; x++) {
      board[x][2] = createPiece(GOTE, PIECE_TYPES.FU);
    }

    hands[SENTE] = {};
    hands[GOTE] = {};
  }

  function createPiece(owner, type, promoted=false) {
    return { owner, type, promoted };
  }

  // --- 描画 ---
  function render() {
    boardEl.innerHTML = '';
    for (let y = 0; y < BOARD_SIZE; y++) {
      for (let x = 0; x < BOARD_SIZE; x++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.x = x;
        cell.dataset.y = y;

        if (selected && !selected.hand && selected.x === x && selected.y === y) {
          cell.classList.add('highlight-select');
        }

        if (highlightOn && legalMoves.some(m => m.to.x === x && m.to.y === y)) {
          cell.classList.add('highlight-move');
        }

        const piece = board[x][y];
        if (piece) {
          const p = document.createElement('div');
          p.className = 'piece ' + (piece.owner === SENTE ? 'sente' : 'gote');
          if (piece.promoted) p.classList.add('promoted');
          p.textContent = getPieceLabel(piece);
          cell.appendChild(p);
        }

        cell.addEventListener('click', onCellClick);
        boardEl.appendChild(cell);
      }
    }
    renderHands();
    updateStatus();
  }

  function renderHands() {
    senteHandEl.querySelectorAll('.hand-piece').forEach(el => el.remove());
    goteHandEl.querySelectorAll('.hand-piece').forEach(el => el.remove());

    const addHandPieces = (owner, container) => {
      const counts = hands[owner];
      Object.keys(counts).forEach(type => {
        const count = counts[type];
        if (!count) return;
        const btn = document.createElement('div');
        btn.className = 'hand-piece';
        btn.dataset.owner = owner;
        btn.dataset.type = type;
        btn.textContent = PIECE_LABEL[type] + (count > 1 ? `×${count}` : '');
        if (selected && selected.hand && selected.owner === owner && selected.type === type) {
          btn.classList.add('selected');
        }
        btn.addEventListener('click', onHandPieceClick);
        container.appendChild(btn);
      });
    };

    addHandPieces(SENTE, senteHandEl);
    addHandPieces(GOTE, goteHandEl);
  }

  function updateStatus() {
    if (gameOver) return;
    if (currentTurn === SENTE) {
      statusEl.textContent = 'あなた（先手）の番です';
    } else {
      statusEl.textContent = '相手（後手）の手番です…';
    }
  }

  function getPieceLabel(piece) {
    if (piece.promoted && PROMOTED_LABEL[piece.type]) {
      return PROMOTED_LABEL[piece.type];
    }
    return PIECE_LABEL[piece.type];
  }

  // --- クリック処理 ---
  function onCellClick(e) {
    if (gameOver) return;
    const x = parseInt(e.currentTarget.dataset.x, 10);
    const y = parseInt(e.currentTarget.dataset.y, 10);
    const piece = board[x][y];

    if (currentTurn !== SENTE) return; // 人間は先手のみ

    // 持ち駒選択中
    if (selected && selected.hand) {
      const moves = legalMoves.filter(m => m.to.x === x && m.to.y === y);
      if (moves.length) {
        const move = moves[0];
        applyMove(move, true);
        return;
      } else {
        clearSelection();
        return;
      }
    }

    // 盤上の駒選択
    if (!selected) {
      if (piece && piece.owner === currentTurn) {
        selected = { x, y };
        legalMoves = generateLegalMovesFor(currentTurn, x, y);
      }
    } else {
      // すでに選択中
      const moves = legalMoves.filter(m => m.to.x === x && m.to.y === y);
      if (moves.length) {
        const move = moves[0];
        applyMove(move, true);
      } else {
        // 別の自駒を選択し直し
        if (piece && piece.owner === currentTurn) {
          selected = { x, y };
          legalMoves = generateLegalMovesFor(currentTurn, x, y);
        } else {
          clearSelection();
        }
      }
    }
    render();
  }

  function onHandPieceClick(e) {
    if (gameOver) return;
    if (currentTurn !== SENTE) return;
    const owner = e.currentTarget.dataset.owner;
    const type = e.currentTarget.dataset.type;
    if (owner !== currentTurn) return;

    if (selected && selected.hand && selected.type === type && selected.owner === owner) {
      clearSelection();
    } else {
      selected = { hand: true, owner, type };
      legalMoves = generateDropMoves(owner, type);
    }
    render();
  }

  function clearSelection() {
    selected = null;
    legalMoves = [];
  }

  // --- 手生成 ---
  function generateAllMoves(owner) {
    const moves = [];
    // 盤上
    for (let y = 0; y < BOARD_SIZE; y++) {
      for (let x = 0; x < BOARD_SIZE; x++) {
        const p = board[x][y];
        if (p && p.owner === owner) {
          const ms = generateLegalMovesFor(owner, x, y);
          moves.push(...ms);
        }
      }
    }
    // 持ち駒
    const hand = hands[owner];
    Object.keys(hand).forEach(type => {
      if (!hand[type]) return;
      const drops = generateDropMoves(owner, type);
      moves.push(...drops);
    });
    return moves;
  }

  function generateLegalMovesFor(owner, x, y) {
    const piece = board[x][y];
    if (!piece) return [];
    const dir = owner === SENTE ? -1 : 1;
    const moves = [];
    const addMove = (nx, ny, opts={}) => {
      if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) return;
      const target = board[nx][ny];
      if (target && target.owner === owner) return;
      const move = {
        from: {x, y},
        to: {x: nx, y: ny},
        capture: target || null,
        drop: false,
        piece: piece,
        promote: false
      };
      // 成り判定（簡易：敵陣に入ったら自動成り）
      if (PROMOTABLE.has(piece.type) && !piece.promoted) {
        const enemyCampRows = owner === SENTE ? [0,1,2] : [6,7,8];
        if (enemyCampRows.includes(ny)) {
          move.promote = true;
        }
      }
      moves.push(move);
    };

    const addSlide = (dx, dy) => {
      let nx = x + dx;
      let ny = y + dy;
      while (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
        const target = board[nx][ny];
        if (target && target.owner === owner) break;
        const move = {
          from: {x, y},
          to: {x: nx, y: ny},
          capture: target || null,
          drop: false,
          piece: piece,
          promote: false
        };
        if (PROMOTABLE.has(piece.type) && !piece.promoted) {
          const enemyCampRows = owner === SENTE ? [0,1,2] : [6,7,8];
          if (enemyCampRows.includes(ny)) {
            move.promote = true;
          }
        }
        moves.push(move);
        if (target) break;
        nx += dx;
        ny += dy;
      }
    };

    const t = piece.type;
    const promoted = piece.promoted;

    if (t === 'FU') {
      const ny = y + dir;
      if (ny >= 0 && ny < BOARD_SIZE) {
        const target = board[x][ny];
        if (!target || target.owner !== owner) {
          addMove(x, ny);
        }
      }
    } else if (t === 'KY') {
      addSlide(0, dir);
    } else if (t === 'KE') {
      const ny1 = y + 2*dir;
      const xs = [x-1, x+1];
      xs.forEach(nx => {
        if (nx >= 0 && nx < BOARD_SIZE && ny1 >= 0 && ny1 < BOARD_SIZE) {
          const target = board[nx][ny1];
          if (!target || target.owner !== owner) {
            addMove(nx, ny1);
          }
        }
      });
    } else if (t === 'GI') {
      const dirs = [
        {dx: 0, dy: dir},
        {dx: -1, dy: dir},
        {dx: 1, dy: dir},
        {dx: -1, dy: -dir},
        {dx: 1, dy: -dir}
      ];
      dirs.forEach(d => addMove(x + d.dx, y + d.dy));
    } else if (t === 'KI' || (promoted && ['FU','KY','KE','GI'].includes(t))) {
      const dirs = [
        {dx: 0, dy: dir},
        {dx: -1, dy: dir},
        {dx: 1, dy: dir},
        {dx: -1, dy: 0},
        {dx: 1, dy: 0},
        {dx: 0, dy: -dir}
      ];
      dirs.forEach(d => addMove(x + d.dx, y + d.dy));
    } else if (t === 'KA') {
      addSlide(1,1);
      addSlide(1,-1);
      addSlide(-1,1);
      addSlide(-1,-1);
      if (promoted) {
        [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}].forEach(d => addMove(x+d.dx, y+d.dy));
      }
    } else if (t === 'HI') {
      addSlide(1,0);
      addSlide(-1,0);
      addSlide(0,1);
      addSlide(0,-1);
      if (promoted) {
        [{dx:1,dy:1},{dx:1,dy:-1},{dx:-1,dy:1},{dx:-1,dy:-1}].forEach(d => addMove(x+d.dx, y+d.dy));
      }
    } else if (t === 'OU' || t === 'GY') {
      const dirs = [
        {dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1},
        {dx:1,dy:1},{dx:1,dy:-1},{dx:-1,dy:1},{dx:-1,dy:-1}
      ];
      dirs.forEach(d => addMove(x + d.dx, y + d.dy));
    }

    return moves;
  }

  function generateDropMoves(owner, type) {
    const moves = [];
    for (let y = 0; y < BOARD_SIZE; y++) {
      for (let x = 0; x < BOARD_SIZE; x++) {
        if (board[x][y]) continue;
        // 二歩チェック（簡易）
        if (type === 'FU') {
          let hasPawn = false;
          for (let yy = 0; yy < BOARD_SIZE; yy++) {
            const p = board[x][yy];
            if (p && p.owner === owner && p.type === 'FU' && !p.promoted) {
              hasPawn = true;
              break;
            }
          }
          if (hasPawn) continue;
          // 打ち歩詰めは無視（簡略）
        }
        // 行き所のない駒（簡略チェック）
        if (type === 'FU' || type === 'KY') {
          if ((owner === SENTE && y === 0) || (owner === GOTE && y === 8)) continue;
        }
        if (type === 'KE') {
          if ((owner === SENTE && y <= 1) || (owner === GOTE && y >= 7)) continue;
        }

        moves.push({
          from: null,
          to: {x, y},
          capture: null,
          drop: true,
          dropType: type,
          owner,
          promote: false
        });
      }
    }
    return moves;
  }

  // --- 手の適用 ---
  function applyMove(move, isHuman) {
    if (move.drop) {
      // 持ち駒から
      hands[move.owner][move.dropType] = (hands[move.owner][move.dropType] || 0) - 1;
      if (hands[move.owner][move.dropType] <= 0) delete hands[move.owner][move.dropType];
      board[move.to.x][move.to.y] = createPiece(move.owner, move.dropType, false);
      showMoveBanner(move, isHuman);
    } else {
      const piece = board[move.from.x][move.from.y];
      board[move.from.x][move.from.y] = null;
      if (move.capture) {
        const capturedType = move.capture.type;
        const baseType = move.capture.promoted ? demoteType(capturedType) : capturedType;
        const owner = piece.owner;
        hands[owner][baseType] = (hands[owner][baseType] || 0) + 1;
      }
      const newPiece = createPiece(piece.owner, piece.type, piece.promote || piece.promoted || move.promote);
      board[move.to.x][move.to.y] = newPiece;
      showMoveBanner(move, isHuman);
    }

    clearSelection();
    render();

    // 勝敗判定（王/玉が取られたら終了）
    if (isKingMissing(GOTE)) {
      endGame(true);
      return;
    }
    if (isKingMissing(SENTE)) {
      endGame(false);
      return;
    }

    currentTurn = currentTurn === SENTE ? GOTE : SENTE;
    updateStatus();

    if (!isHuman && !gameOver) {
      // nothing
    } else if (currentTurn === GOTE && !gameOver) {
      setTimeout(aiMove, 300);
    }
  }

  function demoteType(type) {
    if (['FU','KY','KE','GI'].includes(type)) return type;
    if (type === 'KA') return 'KA';
    if (type === 'HI') return 'HI';
    return type;
  }

  function isKingMissing(owner) {
    const kingType = owner === SENTE ? 'OU' : 'GY';
    for (let y = 0; y < BOARD_SIZE; y++) {
      for (let x = 0; x < BOARD_SIZE; x++) {
        const p = board[x][y];
        if (p && p.owner === owner && p.type === kingType) return false;
      }
    }
    return true;
  }

  // --- AI ---
  function aiMove() {
    if (gameOver) return;
    const difficulty = parseInt(document.getElementById('difficulty').value, 10);
    const moves = generateAllMoves(GOTE);
    if (!moves.length) {
      endGame(true);
      return;
    }

    let bestMove = null;
    let bestScore = -Infinity;

    const depth = difficulty >= 4 ? 2 : 1;
    const randomness = 6 - difficulty; // 難易度高いほどランダム性低い

    for (const move of moves) {
      const snapshot = snapshotState();
      applyMoveInternal(move);
      const score = -negamax(SENTE, depth - 1, -Infinity, Infinity) + (Math.random() * randomness);
      restoreState(snapshot);
      if (score > bestScore) {
        bestScore = score;
        bestMove = move;
      }
    }

    if (!bestMove) {
      bestMove = moves[Math.floor(Math.random() * moves.length)];
    }
    applyMove(bestMove, false);
  }

  function snapshotState() {
    return {
      board: board.map(col => col.map(p => p ? {...p} : null)),
      hands: {
        [SENTE]: {...hands[SENTE]},
        [GOTE]: {...hands[GOTE]}
      },
      currentTurn
    };
  }

  function restoreState(snap) {
    board = snap.board.map(col => col.map(p => p ? {...p} : null));
    hands = {
      [SENTE]: {...snap.hands[SENTE]},
      [GOTE]: {...snap.hands[GOTE]}
    };
    currentTurn = snap.currentTurn;
  }

  function applyMoveInternal(move) {
    if (move.drop) {
      hands[move.owner][move.dropType] = (hands[move.owner][move.dropType] || 0) - 1;
      if (hands[move.owner][move.dropType] <= 0) delete hands[move.owner][move.dropType];
      board[move.to.x][move.to.y] = createPiece(move.owner, move.dropType, false);
    } else {
      const piece = board[move.from.x][move.from.y];
      board[move.from.x][move.from.y] = null;
      if (move.capture) {
        const capturedType = move.capture.type;
        const baseType = move.capture.promoted ? demoteType(capturedType) : capturedType;
        const owner = piece.owner;
        hands[owner][baseType] = (hands[owner][baseType] || 0) + 1;
      }
      const newPiece = createPiece(piece.owner, piece.type, piece.promote || piece.promoted || move.promote);
      board[move.to.x][move.to.y] = newPiece;
    }
    currentTurn = currentTurn === SENTE ? GOTE : SENTE;
  }

  function evaluate(owner) {
    let score = 0;
    for (let y = 0; y < BOARD_SIZE; y++) {
      for (let x = 0; x < BOARD_SIZE; x++) {
        const p = board[x][y];
        if (!p) continue;
        const val = PIECE_VALUE[p.type] + (p.promoted ? 1 : 0);
        score += (p.owner === owner ? val : -val);
      }
    }
    const hS = hands[SENTE];
    const hG = hands[GOTE];
    Object.keys(hS).forEach(t => {
      score += (PIECE_VALUE[t] || 1) * hS[t];
    });
    Object.keys(hG).forEach(t => {
      score -= (PIECE_VALUE[t] || 1) * hG[t];
    });
    return score;
  }

  function negamax(owner, depth, alpha, beta) {
    if (depth === 0) {
      return evaluate(owner);
    }
    if (isKingMissing(owner)) {
      return -9999;
    }
    const moves = generateAllMoves(owner);
    if (!moves.length) {
      return -9999;
    }
    let best = -Infinity;
    for (const move of moves) {
      const snapshot = snapshotState();
      applyMoveInternal(move);
      const score = -negamax(owner === SENTE ? GOTE : SENTE, depth - 1, -beta, -alpha);
      restoreState(snapshot);
      if (score > best) best = score;
      if (score > alpha) alpha = score;
      if (alpha >= beta) break;
    }
    return best;
  }

  // --- 勝敗 ---
  function endGame(playerWin) {
    gameOver = true;
    if (playerWin) {
      resultTitle.textContent = '勝利！';
      resultMsg.textContent = 'お見事です。';
    } else {
      resultTitle.textContent = '敗北…';
      resultMsg.textContent = 'また挑戦してみてください。';
    }
    resultOverlay.classList.add('show');
    statusEl.textContent = playerWin ? 'あなたの勝ちです' : 'あなたの負けです';
  }

  // --- 手の名前表示 ---
  function showMoveBanner(move, isHuman) {
    let text = '';
    if (move.drop) {
      const who = isHuman ? 'あなた' : '相手';
      text = `${who}：${PIECE_LABEL[move.dropType]}打ち`;
    } else {
      const piece = move.piece;
      const label = getPieceLabel(piece);
      const action = move.capture ? '取り' : '移動';
      const promoteText = move.promote || piece.promoted ? '（成り）' : '';
      const who = isHuman ? 'あなた' : '相手';
      text = `${who}：${label}${action}${promoteText}`;
    }
    bannerEl.textContent = text;
    bannerEl.classList.add('show');
    if (bannerTimer) clearTimeout(bannerTimer);
    bannerTimer = setTimeout(() => {
      bannerEl.classList.remove('show');
    }, 2000);
  }

  // --- ゲーム開始 ---
  function initGame() {
    gameOver = false;
    currentTurn = SENTE;
    clearSelection();
    initBoard();
    render();
    resultOverlay.classList.remove('show');
  }

  initGame();
</script>
