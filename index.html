<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シンプル将棋</title>
<style>
  :root {
    --board-size: min(90vw, 90vh);
    --cell-count: 9;
    --cell-size: calc(var(--board-size) / var(--cell-count));
    --bg-color: #f5e4c6;
    --board-line: #8b6b3f;
    --piece-color-sente: #222;
    --piece-color-gote: #222;
    --piece-bg: #f9f0d8;
    --highlight-move: rgba(0, 180, 255, 0.35);
    --highlight-select: rgba(255, 215, 0, 0.45);
    --last-move: rgba(0, 0, 0, 0.7);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg-color);
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 900px;
    padding: 8px;
    position: relative;
  }
  .top-bar {
    position: relative;
    padding: 4px 8px;
    font-size: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: space-between;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .controls label {
    font-size: 12px;
    white-space: nowrap;
  }
  .controls input[type="range"] {
    width: 120px;
  }
  .toggle-label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
  }
  .message-banner {
    position: absolute;
    left: 50%;
    top: 0;
    transform: translate(-50%, 0);
    background: var(--last-move);
    color: #fff;
    padding: 4px 10px;
    border-radius: 0 0 6px 6px;
    font-size: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    max-width: 90%;
    text-align: center;
    z-index: 20;
  }
  .message-banner.show {
    opacity: 1;
  }
  .board-wrapper {
    margin-top: 4px;
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .board {
    position: relative;
    width: var(--board-size);
    height: var(--board-size);
    max-width: 100%;
    max-height: 100%;
    border: 2px solid var(--board-line);
    background: #f7e2b8;
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-template-rows: repeat(9, 1fr);
  }
  .cell {
    border: 1px solid rgba(139, 107, 63, 0.5);
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }
  .cell.highlight-move {
    background: var(--highlight-move);
  }
  .cell.highlight-select {
    background: var(--highlight-select);
  }
  .piece {
    width: 80%;
    height: 80%;
    border-radius: 6px;
    background: var(--piece-bg);
    border: 1px solid #b08b4a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: calc(var(--cell-size) * 0.45);
    line-height: 1;
    user-select: none;
  }
  .piece.sente {
    color: var(--piece-color-sente);
  }
  .piece.gote {
    color: var(--piece-color-gote);
    transform: rotate(180deg);
  }
  .piece.promoted::after {
    content: "成";
    position: absolute;
    top: 2px;
    right: 3px;
    font-size: 0.45em;
    color: #c00;
  }
  .hands {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 80px;
    font-size: 12px;
  }
  .hand {
    border: 1px solid #b08b4a;
    background: rgba(255, 255, 255, 0.6);
    padding: 4px;
    border-radius: 4px;
  }
  .hand-title {
    font-weight: 600;
    margin-bottom: 4px;
    text-align: center;
  }
  .hand-pieces {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .hand-piece {
    min-width: 20px;
    padding: 2px 4px;
    border-radius: 4px;
    border: 1px solid #b08b4a;
    background: #f9f0d8;
    text-align: center;
    cursor: pointer;
  }
  .hand-piece.selected {
    background: #ffe08a;
  }
  .status-bar {
    margin-top: 6px;
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  .status-bar span {
    white-space: nowrap;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 30;
  }
  .overlay.show {
    display: flex;
  }
  .overlay-content {
    color: #fff;
    text-align: center;
    padding: 16px;
  }
  .overlay-content h1 {
    margin: 0 0 8px;
    font-size: 32px;
  }
  .overlay-content p {
    margin: 0 0 12px;
    font-size: 14px;
  }
  .overlay-content button {
    padding: 6px 14px;
    border-radius: 4px;
    border: none;
    background: #ffd54f;
    font-size: 14px;
    cursor: pointer;
  }
  @media (max-width: 600px) {
    .piece {
      font-size: calc(var(--cell-size) * 0.5);
    }
    .hand {
      font-size: 11px;
    }
  }
</style>
</head>
<body>
<div class="app">
  <div class="message-banner" id="banner"></div>
  <div class="top-bar">
    <div class="controls">
      <label>難易度:
        <input type="range" id="difficulty" min="1" max="10" value="5">
        <span id="difficultyValue">5</span>
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="toggleHighlight" checked>
        駒のいける方向表示
      </label>
    </div>
    <button id="resetBtn" style="font-size:12px;padding:4px 8px;">リセット</button>
  </div>

  <div class="board-wrapper">
    <div class="hands">
      <div class="hand" id="goteHand">
        <div class="hand-title">後手 持ち駒</div>
        <div class="hand-pieces" id="goteHandPieces"></div>
      </div>
    </div>

    <div class="board" id="board"></div>

    <div class="hands">
      <div class="hand" id="senteHand">
        <div class="hand-title">先手 持ち駒</div>
        <div class="hand-pieces" id="senteHandPieces"></div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span id="turnInfo">手番: 先手（あなた）</span>
    <span id="infoText"></span>
  </div>

  <div class="overlay" id="resultOverlay">
    <div class="overlay-content">
      <h1 id="resultTitle"></h1>
      <p id="resultText"></p>
      <button id="againBtn">もう一度</button>
    </div>
  </div>
</div>

<script>
  // --- データ定義 ---
  const SENTE = 1;
  const GOTE = -1;

  const PIECES = {
    FU: "歩",
    KY: "香",
    KE: "桂",
    GI: "銀",
    KI: "金",
    KA: "角",
    HI: "飛",
    OU: "王",
    GY: "玉"
  };

  const PROMOTABLE = ["FU", "KY", "KE", "GI", "KA", "HI"];

  const DIR = {
    UP: [-1, 0],
    DOWN: [1, 0],
    LEFT: [0, -1],
    RIGHT: [0, 1],
    UL: [-1, -1],
    UR: [-1, 1],
    DL: [1, -1],
    DR: [1, 1]
  };

  const boardEl = document.getElementById("board");
  const bannerEl = document.getElementById("banner");
  const difficultyEl = document.getElementById("difficulty");
  const difficultyValueEl = document.getElementById("difficultyValue");
  const toggleHighlightEl = document.getElementById("toggleHighlight");
  const turnInfoEl = document.getElementById("turnInfo");
  const infoTextEl = document.getElementById("infoText");
  const senteHandEl = document.getElementById("senteHandPieces");
  const goteHandEl = document.getElementById("goteHandPieces");
  const resultOverlayEl = document.getElementById("resultOverlay");
  const resultTitleEl = document.getElementById("resultTitle");
  const resultTextEl = document.getElementById("resultText");
  const againBtn = document.getElementById("againBtn");
  const resetBtn = document.getElementById("resetBtn");

  let board = [];
  let turn = SENTE;
  let selected = null; // {r,c} or null
  let selectedDrop = null; // {owner, type}
  let highlightMoves = [];
  let senteHand = {};
  let goteHand = {};
  let gameOver = false;
  let bannerTimer = null;

  function createEmptyBoard() {
    const b = [];
    for (let r = 0; r < 9; r++) {
      const row = [];
      for (let c = 0; c < 9; c++) row.push(null);
      b.push(row);
    }
    return b;
  }

  function initBoard() {
    board = createEmptyBoard();
    senteHand = {};
    goteHand = {};
    turn = SENTE;
    selected = null;
    selectedDrop = null;
    highlightMoves = [];
    gameOver = false;
    infoTextEl.textContent = "";
    hideBanner();
    resultOverlayEl.classList.remove("show");

    // 先手側（下）
    const bottom = [
      "KY", "KE", "GI", "KI", "OU", "KI", "GI", "KE", "KY"
    ];
    for (let c = 0; c < 9; c++) {
      board[8][c] = { owner: SENTE, type: bottom[c], promoted: false };
      board[6][c] = { owner: SENTE, type: "FU", promoted: false };
    }
    board[7][1] = { owner: SENTE, type: "HI", promoted: false }; // 飛
    board[7][7] = { owner: SENTE, type: "KA", promoted: false }; // 角

    // 後手側（上）
    const top = [
      "KY", "KE", "GI", "KI", "GY", "KI", "GI", "KE", "KY"
    ];
    for (let c = 0; c < 9; c++) {
      board[0][c] = { owner: GOTE, type: top[c], promoted: false };
      board[2][c] = { owner: GOTE, type: "FU", promoted: false };
    }
    board[1][7] = { owner: GOTE, type: "HI", promoted: false }; // 飛
    board[1][1] = { owner: GOTE, type: "KA", promoted: false }; // 角

    render();
    updateTurnInfo();
  }

  // --- 描画 ---
  function render() {
    boardEl.innerHTML = "";
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.r = r;
        cell.dataset.c = c;

        if (selected && selected.r === r && selected.c === c) {
          cell.classList.add("highlight-select");
        }
        if (highlightMoves.some(m => m.r === r && m.c === c)) {
          cell.classList.add("highlight-move");
        }

        const piece = board[r][c];
        if (piece) {
          const div = document.createElement("div");
          div.className = "piece " + (piece.owner === SENTE ? "sente" : "gote");
          if (piece.promoted) div.classList.add("promoted");
          div.textContent = pieceKanji(piece);
          cell.appendChild(div);
        }

        cell.addEventListener("click", () => onCellClick(r, c));
        boardEl.appendChild(cell);
      }
    }
    renderHands();
  }

  function renderHands() {
    senteHandEl.innerHTML = "";
    goteHandEl.innerHTML = "";

    const sentePieces = Object.entries(senteHand);
    const gotePieces = Object.entries(goteHand);

    for (const [type, count] of sentePieces) {
      if (count <= 0) continue;
      const div = document.createElement("div");
      div.className = "hand-piece";
      div.textContent = PIECES[type] + "×" + count;
      div.dataset.owner = SENTE;
      div.dataset.type = type;
      if (selectedDrop && selectedDrop.owner === SENTE && selectedDrop.type === type) {
        div.classList.add("selected");
      }
      div.addEventListener("click", () => onHandPieceClick(SENTE, type));
      senteHandEl.appendChild(div);
    }

    for (const [type, count] of gotePieces) {
      if (count <= 0) continue;
      const div = document.createElement("div");
      div.className = "hand-piece";
      div.textContent = PIECES[type] + "×" + count;
      div.dataset.owner = GOTE;
      div.dataset.type = type;
      if (selectedDrop && selectedDrop.owner === GOTE && selectedDrop.type === type) {
        div.classList.add("selected");
      }
      // 後手はAIなのでクリック不可
      goteHandEl.appendChild(div);
    }
  }

  function pieceKanji(p) {
    if (!p) return "";
    if (p.promoted) {
      if (p.type === "FU") return "と";
      if (p.type === "KY") return "成香";
      if (p.type === "KE") return "成桂";
      if (p.type === "GI") return "成銀";
      if (p.type === "KA") return "馬";
      if (p.type === "HI") return "龍";
    }
    return PIECES[p.type] || "";
  }

  // --- クリック処理 ---
  function onCellClick(r, c) {
    if (gameOver) return;
    if (turn !== SENTE) return; // あなたは先手

    const cellPiece = board[r][c];

    // 持ち駒からの打ち
    if (selectedDrop && !cellPiece) {
      const moves = generateDropsFor(selectedDrop.owner, selectedDrop.type);
      const canDrop = moves.some(m => m.r === r && m.c === c);
      if (!canDrop) {
        clearSelection();
        render();
        return;
      }
      applyDropMove(selectedDrop.owner, selectedDrop.type, r, c, true);
      clearSelection();
      render();
      afterPlayerMove();
      return;
    }

    // 自分の駒を選択
    if (cellPiece && cellPiece.owner === SENTE) {
      selectedDrop = null;
      selected = { r, c };
      highlightMoves = toggleHighlightEl.checked ? generateMovesFor(r, c, board, SENTE) : [];
      render();
      return;
    }

    // 移動先を選択
    if (selected) {
      const moves = generateMovesFor(selected.r, selected.c, board, SENTE);
      const target = moves.find(m => m.r === r && m.c === c);
      if (!target) {
        clearSelection();
        render();
        return;
      }
      applyMove(selected.r, selected.c, r, c, target.promote, true);
      clearSelection();
      render();
      afterPlayerMove();
      return;
    }
  }

  function onHandPieceClick(owner, type) {
    if (gameOver) return;
    if (owner !== SENTE) return;
    if (turn !== SENTE) return;

    if (selectedDrop && selectedDrop.owner === owner && selectedDrop.type === type) {
      selectedDrop = null;
      highlightMoves = [];
    } else {
      selected = null;
      selectedDrop = { owner, type };
      highlightMoves = toggleHighlightEl.checked ? generateDropsFor(owner, type) : [];
    }
    render();
  }

  function clearSelection() {
    selected = null;
    selectedDrop = null;
    highlightMoves = [];
  }

  // --- 手生成 ---
  function inBounds(r, c) {
    return r >= 0 && r < 9 && c >= 0 && c < 9;
  }

  function isEnemy(p, owner) {
    return p && p.owner !== owner;
  }

  function isFriend(p, owner) {
    return p && p.owner === owner;
  }

  function promotionZone(owner, r) {
    return owner === SENTE ? r <= 2 : r >= 6;
  }

  function generateMovesFor(r, c, b, owner) {
    const p = b[r][c];
    if (!p || p.owner !== owner) return [];
    const moves = [];
    const dir = owner === SENTE ? -1 : 1;

    const addStep = (dr, dc) => {
      const nr = r + dr;
      const nc = c + dc;
      if (!inBounds(nr, nc)) return;
      const target = b[nr][nc];
      if (isFriend(target, owner)) return;
      const promote = shouldPromote(p, r, nr, owner);
      moves.push({ r: nr, c: nc, promote });
    };

    const addSlide = (dr, dc) => {
      let nr = r + dr;
      let nc = c + dc;
      while (inBounds(nr, nc)) {
        const target = b[nr][nc];
        if (isFriend(target, owner)) break;
        const promote = shouldPromote(p, r, nr, owner);
        moves.push({ r: nr, c: nc, promote });
        if (target) break;
        nr += dr;
        nc += dc;
      }
    };

    const type = p.type;
    const promoted = p.promoted;

    if (!promoted) {
      switch (type) {
        case "FU":
          addStep(dir, 0);
          break;
        case "KY":
          addSlide(dir, 0);
          break;
        case "KE":
          addStep(2 * dir, -1);
          addStep(2 * dir, 1);
          break;
        case "GI":
          addStep(dir, 0);
          addStep(dir, -1);
          addStep(dir, 1);
          addStep(-dir, -1);
          addStep(-dir, 1);
          break;
        case "KI":
        case "OU":
        case "GY":
          if (owner === SENTE) {
            addStep(-1, 0);
            addStep(-1, -1);
            addStep(-1, 1);
            addStep(0, -1);
            addStep(0, 1);
            addStep(1, 0);
          } else {
            addStep(1, 0);
            addStep(1, -1);
            addStep(1, 1);
            addStep(0, -1);
            addStep(0, 1);
            addStep(-1, 0);
          }
          if (type === "OU" || type === "GY") {
            addStep(-1, -1);
            addStep(-1, 1);
            addStep(1, -1);
            addStep(1, 1);
          }
          break;
        case "KA":
          addSlide(-1, -1);
          addSlide(-1, 1);
          addSlide(1, -1);
          addSlide(1, 1);
          break;
        case "HI":
          addSlide(-1, 0);
          addSlide(1, 0);
          addSlide(0, -1);
          addSlide(0, 1);
          break;
      }
    } else {
      // 成り駒の動き（金相当＋角・飛の追加）
      if (["FU", "KY", "KE", "GI"].includes(type)) {
        if (owner === SENTE) {
          addStep(-1, 0);
          addStep(-1, -1);
          addStep(-1, 1);
          addStep(0, -1);
          addStep(0, 1);
          addStep(1, 0);
        } else {
          addStep(1, 0);
          addStep(1, -1);
          addStep(1, 1);
          addStep(0, -1);
          addStep(0, 1);
          addStep(-1, 0);
        }
      } else if (type === "KA") {
        addSlide(-1, -1);
        addSlide(-1, 1);
        addSlide(1, -1);
        addSlide(1, 1);
        addStep(-1, 0);
        addStep(1, 0);
        addStep(0, -1);
        addStep(0, 1);
      } else if (type === "HI") {
        addSlide(-1, 0);
        addSlide(1, 0);
        addSlide(0, -1);
        addSlide(0, 1);
        addStep(-1, -1);
        addStep(-1, 1);
        addStep(1, -1);
        addStep(1, 1);
      }
    }

    return moves;
  }

  function shouldPromote(piece, fromR, toR, owner) {
    if (!PROMOTABLE.includes(piece.type)) return false;
    if (piece.promoted) return false;
    if (!promotionZone(owner, fromR) && !promotionZone(owner, toR)) return false;
    // 簡易的に「自動成り」
    return true;
  }

  function generateDropsFor(owner, type) {
    const moves = [];
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        if (board[r][c]) continue;
        // 歩の二歩などは簡略化して未チェック
        // 香・桂が行き場のない段には打たない
        if (type === "KY") {
          if (owner === SENTE && r === 0) continue;
          if (owner === GOTE && r === 8) continue;
        }
        if (type === "KE") {
          if (owner === SENTE && r <= 1) continue;
          if (owner === GOTE && r >= 7) continue;
        }
        moves.push({ r, c });
      }
    }
    return moves;
  }

  // --- 手適用 ---
  function applyMove(fr, fc, tr, tc, promote, isHuman) {
    const piece = board[fr][fc];
    const target = board[tr][tc];
    if (target) {
      capturePiece(piece.owner, target);
    }
    board[fr][fc] = null;
    const newPiece = { ...piece };
    if (promote) newPiece.promoted = true;
    board[tr][tc] = newPiece;

    const moveName = describeMove(piece, fr, fc, tr, tc, promote, target, isHuman ? "先手" : "後手");
    showBanner(moveName);
    checkGameEnd();
  }

  function applyDropMove(owner, type, r, c, isHuman) {
    board[r][c] = { owner, type, promoted: false };
    if (owner === SENTE) {
      senteHand[type] = (senteHand[type] || 0) - 1;
      if (senteHand[type] <= 0) delete senteHand[type];
    } else {
      goteHand[type] = (goteHand[type] || 0) - 1;
      if (goteHand[type] <= 0) delete goteHand[type];
    }
    const moveName = (isHuman ? "先手" : "後手") + "：持ち駒「" + PIECES[type] + "」を打つ";
    showBanner(moveName);
    checkGameEnd();
  }

  function capturePiece(captorOwner, captured) {
    if (captured.type === "OU" || captured.type === "GY") {
      // 王・玉は取られたらゲーム終了
    } else {
      const baseType = captured.promoted ? demoteType(captured.type) : captured.type;
      const hand = captorOwner === SENTE ? senteHand : goteHand;
      hand[baseType] = (hand[baseType] || 0) + 1;
    }
  }

  function demoteType(type) {
    // 成り駒を元の種類に
    if (["FU", "KY", "KE", "GI"].includes(type)) return type;
    if (type === "KA") return "KA";
    if (type === "HI") return "HI";
    return type;
  }

  // --- 手の名前 ---
  function describeMove(piece, fr, fc, tr, tc, promote, captured, sideName) {
    const file = 9 - tc;
    const rank = tr + 1;
    const pieceName = pieceKanji(piece);
    let action = captured ? "で取る" : "へ動く";
    if (promote) action += "（成り）";
    return `${sideName}：${pieceName}が${file}${rank}に${action}`;
  }

  // --- 勝敗判定 ---
  function checkGameEnd() {
    let hasSenteKing = false;
    let hasGoteKing = false;
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        const p = board[r][c];
        if (!p) continue;
        if (p.type === "OU" && p.owner === SENTE) hasSenteKing = true;
        if (p.type === "GY" && p.owner === GOTE) hasGoteKing = true;
      }
    }
    if (!hasSenteKing || !hasGoteKing) {
      gameOver = true;
      const youWin = hasSenteKing && !hasGoteKing;
      showResult(youWin);
    }
  }

  function showResult(youWin) {
    resultTitleEl.textContent = youWin ? "勝利！" : "敗北…";
    resultTextEl.textContent = youWin
      ? "お見事です。もう一局指してみますか？"
      : "相手に王を取られてしまいました。リベンジしてみましょう。";
    resultOverlayEl.classList.add("show");
  }

  // --- バナー ---
  function showBanner(text) {
    bannerEl.textContent = text;
    bannerEl.classList.add("show");
    if (bannerTimer) clearTimeout(bannerTimer);
    bannerTimer = setTimeout(() => {
      hideBanner();
    }, 2500);
  }

  function hideBanner() {
    bannerEl.classList.remove("show");
  }

  // --- AI ---
  function afterPlayerMove() {
    if (gameOver) return;
    turn = GOTE;
    updateTurnInfo();
    setTimeout(() => {
      aiMove();
    }, 300);
  }

  function aiMove() {
    if (gameOver) return;
    const difficulty = parseInt(difficultyEl.value, 10);
    const depth = difficulty <= 3 ? 1 : difficulty <= 7 ? 2 : 3;
    const randomness = 11 - difficulty; // 難易度が高いほどランダム性減少

    const moves = generateAllMoves(GOTE, board, goteHand);
    if (moves.length === 0) {
      gameOver = true;
      showResult(true);
      return;
    }

    let bestScore = -Infinity;
    let bestMoves = [];

    for (const mv of moves) {
      const snapshot = snapshotState();
      applyGenericMove(mv, false);
      const score = -negamax(SENTE, depth - 1, -Infinity, Infinity);
      restoreState(snapshot);

      if (score > bestScore) {
        bestScore = score;
        bestMoves = [mv];
      } else if (score === bestScore) {
        bestMoves.push(mv);
      }
    }

    let chosen;
    if (bestMoves.length > 1 && randomness > 1) {
      const idx = Math.floor(Math.random() * Math.min(bestMoves.length, randomness));
      chosen = bestMoves[idx];
    } else {
      chosen = bestMoves[Math.floor(Math.random() * bestMoves.length)];
    }

    applyGenericMove(chosen, true);
    render();
    if (!gameOver) {
      turn = SENTE;
      updateTurnInfo();
    }
  }

  function generateAllMoves(owner, b, hand) {
    const moves = [];
    // 盤上の駒
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        const p = b[r][c];
        if (!p || p.owner !== owner) continue;
        const ms = generateMovesFor(r, c, b, owner);
        for (const m of ms) {
          moves.push({
            kind: "move",
            fr: r,
            fc: c,
            tr: m.r,
            tc: m.c,
            promote: m.promote
          });
        }
      }
    }
    // 持ち駒
    for (const [type, count] of Object.entries(hand)) {
      if (count <= 0) continue;
      const ds = generateDropsFor(owner, type);
      for (const d of ds) {
        moves.push({
          kind: "drop",
          owner,
          type,
          r: d.r,
          c: d.c
        });
      }
    }
    return moves;
  }

  function materialScore() {
    const value = {
      FU: 1,
      KY: 3,
      KE: 3,
      GI: 4,
      KI: 5,
      KA: 8,
      HI: 9,
      OU: 100,
      GY: 100
    };
    let score = 0;
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        const p = board[r][c];
        if (!p) continue;
        let v = value[p.type] || 0;
        if (p.promoted && ["FU", "KY", "KE", "GI"].includes(p.type)) v += 1;
        if (p.owner === SENTE) score += v;
        else score -= v;
      }
    }
    for (const [t, n] of Object.entries(senteHand)) {
      score += (value[t] || 0) * n;
    }
    for (const [t, n] of Object.entries(goteHand)) {
      score -= (value[t] || 0) * n;
    }
    return score;
  }

  function negamax(owner, depth, alpha, beta) {
    if (depth === 0 || gameOver) {
      return materialScore() * (owner === SENTE ? 1 : -1);
    }
    const hand = owner === SENTE ? senteHand : goteHand;
    const moves = generateAllMoves(owner, board, hand);
    if (moves.length === 0) {
      return -9999;
    }
    let best = -Infinity;
    for (const mv of moves) {
      const snapshot = snapshotState();
      applyGenericMove(mv, false);
      const score = -negamax(-owner, depth - 1, -beta, -alpha);
      restoreState(snapshot);
      if (score > best) best = score;
      if (score > alpha) alpha = score;
      if (alpha >= beta) break;
    }
    return best;
  }

  function snapshotState() {
    return {
      board: board.map(row => row.map(p => p ? { ...p } : null)),
      senteHand: { ...senteHand },
      goteHand: { ...goteHand },
      turn,
      gameOver
    };
  }

  function restoreState(s) {
    board = s.board.map(row => row.map(p => p ? { ...p } : null));
    senteHand = { ...s.senteHand };
    goteHand = { ...s.goteHand };
    turn = s.turn;
    gameOver = s.gameOver;
  }

  function applyGenericMove(mv, showName) {
    if (mv.kind === "move") {
      const piece = board[mv.fr][mv.fc];
      const target = board[mv.tr][mv.tc];
      if (target) {
        capturePiece(piece.owner, target);
      }
      board[mv.fr][mv.fc] = null;
      const newPiece = { ...piece };
      if (mv.promote) newPiece.promoted = true;
      board[mv.tr][mv.tc] = newPiece;
      if (showName) {
        const moveName = describeMove(
          piece,
          mv.fr,
          mv.fc,
          mv.tr,
          mv.tc,
          mv.promote,
          target,
          "後手"
        );
        showBanner(moveName);
        checkGameEnd();
      }
    } else if (mv.kind === "drop") {
      board[mv.r][mv.c] = { owner: mv.owner, type: mv.type, promoted: false };
      if (mv.owner === SENTE) {
        senteHand[mv.type] = (senteHand[mv.type] || 0) - 1;
        if (senteHand[mv.type] <= 0) delete senteHand[mv.type];
      } else {
        goteHand[mv.type] = (goteHand[mv.type] || 0) - 1;
        if (goteHand[mv.type] <= 0) delete goteHand[mv.type];
      }
      if (showName) {
        const moveName = "後手：持ち駒「" + PIECES[mv.type] + "」を打つ";
        showBanner(moveName);
        checkGameEnd();
      }
    }
  }

  // --- UI ---
  function updateTurnInfo() {
    turnInfoEl.textContent = "手番: " + (turn === SENTE ? "先手（あなた）" : "後手（AI）");
  }

  difficultyEl.addEventListener("input", () => {
    difficultyValueEl.textContent = difficultyEl.value;
  });

  againBtn.addEventListener("click", () => {
    initBoard();
  });

  resetBtn.addEventListener("click", () => {
    initBoard();
  });

  // 初期化
  initBoard();
</script>
</body>
</html>
