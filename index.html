<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シンプル将棋</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --board-size: min(90vw, 90vh);
    --cell-size: calc(var(--board-size) / 9);
    --border-color: #333;
    --light-cell: #f5e6c8;
    --dark-cell: #e0c89f;
    --highlight: rgba(255, 230, 120, 0.8);
    --last-move: rgba(150, 200, 255, 0.6);
  }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #faf7f0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }
  .wrapper {
    width: 100%;
    max-width: 900px;
    padding: 8px;
    box-sizing: border-box;
  }
  .top-bar {
    position: relative;
    margin-bottom: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: space-between;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .controls label {
    font-size: 14px;
  }
  select, input[type="checkbox"], button {
    font-size: 14px;
  }
  .move-banner {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    padding: 6px 12px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    border-radius: 0 0 6px 6px;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 20;
  }
  .move-banner.show {
    opacity: 1;
  }
  .board-container {
    margin: 0 auto;
    width: var(--board-size);
    height: var(--board-size);
    border: 3px solid var(--border-color);
    box-sizing: border-box;
    position: relative;
    background: #d9b97c;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-template-rows: repeat(9, 1fr);
    width: 100%;
    height: 100%;
  }
  .cell {
    border: 1px solid rgba(0,0,0,0.2);
    position: relative;
    box-sizing: border-box;
    background: var(--light-cell);
  }
  .cell:nth-child(odd) {
    background: var(--dark-cell);
  }
  .cell.highlight {
    box-shadow: inset 0 0 0 3px var(--highlight);
  }
  .cell.last-move {
    background: var(--last-move);
  }
  .piece {
    position: absolute;
    inset: 4px;
    border-radius: 4px;
    background: #fdf7e3;
    border: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: calc(var(--cell-size) * 0.45);
    box-sizing: border-box;
    cursor: pointer;
    user-select: none;
    transform-origin: center;
  }
  .piece.ai {
    transform: rotate(180deg);
    background: #f3e0c0;
  }
  .piece.promoted {
    color: #c00;
  }
  .hands {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    gap: 8px;
    flex-wrap: wrap;
  }
  .hand {
    flex: 1;
    min-width: 120px;
    border: 2px solid #444;
    background: #f0e4cf;
    padding: 4px;
    box-sizing: border-box;
  }
  .hand-title {
    font-size: 13px;
    margin-bottom: 4px;
    text-align: center;
    font-weight: 600;
  }
  .hand-pieces {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .hand-piece {
    border-radius: 4px;
    border: 1px solid #333;
    padding: 2px 4px;
    font-size: 14px;
    background: #fff7dd;
    cursor: pointer;
  }
  .hand-piece.selected {
    background: #ffe08a;
  }
  .status-bar {
    margin-top: 6px;
    font-size: 14px;
    text-align: center;
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .overlay-content {
    background: #fff;
    padding: 24px 32px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    animation: pop 0.4s ease;
  }
  .overlay-content h1 {
    margin: 0 0 8px;
    font-size: 28px;
  }
  .overlay-content p {
    margin: 0 0 16px;
    font-size: 16px;
  }
  .overlay-content button {
    padding: 8px 16px;
    font-size: 15px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: #0078d4;
    color: #fff;
  }
  @keyframes pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  @media (max-width: 600px) {
    .overlay-content {
      width: 80%;
      padding: 16px;
    }
    .overlay-content h1 {
      font-size: 22px;
    }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="move-banner" id="moveBanner"></div>
  <div class="top-bar">
    <div class="controls">
      <label>難易度:
        <select id="difficulty">
          <option value="1">1（やさしい）</option>
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5（つよい）</option>
        </select>
      </label>
      <label>
        <input type="checkbox" id="highlightToggle" checked> 駒のいける方向オン
      </label>
      <button id="resetBtn">リセット</button>
    </div>
    <div style="font-size:13px;">先手：あなた（玉） / 後手：AI（王）</div>
  </div>

  <div class="board-container">
    <div class="board" id="board"></div>
  </div>

  <div class="hands">
    <div class="hand" id="playerHand">
      <div class="hand-title">あなたの持ち駒</div>
      <div class="hand-pieces" id="playerHandPieces"></div>
    </div>
    <div class="hand" id="aiHand">
      <div class="hand-title">AIの持ち駒</div>
      <div class="hand-pieces" id="aiHandPieces"></div>
    </div>
  </div>

  <div class="status-bar" id="statusBar">あなたの手番です。</div>

  <div class="overlay" id="resultOverlay">
    <div class="overlay-content">
      <h1 id="resultTitle"></h1>
      <p id="resultText"></p>
      <button id="againBtn">もう一度</button>
    </div>
  </div>
</div>

<script>
  const boardEl = document.getElementById('board');
  const statusBar = document.getElementById('statusBar');
  const difficultyEl = document.getElementById('difficulty');
  const highlightToggle = document.getElementById('highlightToggle');
  const resetBtn = document.getElementById('resetBtn');
  const playerHandEl = document.getElementById('playerHandPieces');
  const aiHandEl = document.getElementById('aiHandPieces');
  const moveBanner = document.getElementById('moveBanner');
  const resultOverlay = document.getElementById('resultOverlay');
  const resultTitle = document.getElementById('resultTitle');
  const resultText = document.getElementById('resultText');
  const againBtn = document.getElementById('againBtn');

  const PIECES = {
    P: { name: '歩', promoted: 'と' },
    L: { name: '香', promoted: '成香' },
    N: { name: '桂', promoted: '成桂' },
    S: { name: '銀', promoted: '成銀' },
    G: { name: '金' },
    B: { name: '角', promoted: '馬' },
    R: { name: '飛', promoted: '龍' },
    K: { name: '玉' },
    k: { name: '王' }
  };

  let board = [];
  let playerHand = {};
  let aiHand = {};
  let selected = null; // {type:'board'|'hand', x,y,piece}
  let legalMoves = [];
  let lastMove = null;
  let gameOver = false;

  function initBoard() {
    board = Array.from({ length: 9 }, () => Array(9).fill(null));
    playerHand = {};
    aiHand = {};
    gameOver = false;
    selected = null;
    legalMoves = [];
    lastMove = null;

    // 初期配置（先手：下、後手：上）
    // 後手側
    const topBack = ['L','N','S','G','k','G','S','N','L'];
    for (let x = 0; x < 9; x++) {
      board[0][x] = { side: 'ai', type: topBack[x], promoted: false };
      board[2][x] = { side: 'ai', type: 'P', promoted: false };
    }
    // 角（左）飛（右）
    board[1][1] = { side: 'ai', type: 'R', promoted: false }; // 2筋
    board[1][7] = { side: 'ai', type: 'B', promoted: false }; // 8筋

    // 先手側
    const bottomBack = ['L','N','S','G','K','G','S','N','L'];
    for (let x = 0; x < 9; x++) {
      board[8][x] = { side: 'player', type: bottomBack[x], promoted: false };
      board[6][x] = { side: 'player', type: 'P', promoted: false };
    }
    board[7][1] = { side: 'player', type: 'B', promoted: false }; // 2筋
    board[7][7] = { side: 'player', type: 'R', promoted: false }; // 8筋

    render();
    statusBar.textContent = 'あなたの手番です。';
  }

  function render() {
    boardEl.innerHTML = '';
    for (let y = 0; y < 9; y++) {
      for (let x = 0; x < 9; x++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.x = x;
        cell.dataset.y = y;

        if (lastMove && lastMove.to.x === x && lastMove.to.y === y) {
          cell.classList.add('last-move');
        }

        if (highlightToggle.checked && legalMoves.some(m => m.to.x === x && m.to.y === y)) {
          cell.classList.add('highlight');
        }

        const piece = board[y][x];
        if (piece) {
          const pieceEl = document.createElement('div');
          pieceEl.className = 'piece ' + (piece.side === 'ai' ? 'ai' : 'player');
          if (piece.promoted) pieceEl.classList.add('promoted');
          pieceEl.textContent = getPieceChar(piece);
          pieceEl.addEventListener('click', (e) => {
            e.stopPropagation();
            onPieceClick(x, y);
          });
          cell.appendChild(pieceEl);
        }

        cell.addEventListener('click', () => onCellClick(x, y));
        boardEl.appendChild(cell);
      }
    }
    renderHands();
  }

  function renderHands() {
    playerHandEl.innerHTML = '';
    aiHandEl.innerHTML = '';

    Object.keys(playerHand).forEach(type => {
      const count = playerHand[type];
      if (count > 0) {
        const el = document.createElement('div');
        el.className = 'hand-piece';
        if (selected && selected.type === 'hand' && selected.side === 'player' && selected.pieceType === type) {
          el.classList.add('selected');
        }
        el.textContent = PIECES[type].name + (count > 1 ? `×${count}` : '');
        el.addEventListener('click', () => onHandPieceClick('player', type));
        playerHandEl.appendChild(el);
      }
    });

    Object.keys(aiHand).forEach(type => {
      const count = aiHand[type];
      if (count > 0) {
        const el = document.createElement('div');
        el.className = 'hand-piece';
        el.textContent = PIECES[type].name + (count > 1 ? `×${count}` : '');
        aiHandEl.appendChild(el);
      }
    });
  }

  function getPieceChar(piece) {
    if (piece.promoted && PIECES[piece.type].promoted) {
      return PIECES[piece.type].promoted;
    }
    return PIECES[piece.type].name;
  }

  function onPieceClick(x, y) {
    if (gameOver) return;
    const piece = board[y][x];
    if (!piece) return;
    if (piece.side !== 'player') return;

    if (selected && selected.type === 'board' && selected.x === x && selected.y === y) {
      selected = null;
      legalMoves = [];
    } else {
      selected = { type: 'board', x, y, piece };
      legalMoves = generateMovesForPiece(x, y, piece, 'player');
    }
    render();
  }

  function onCellClick(x, y) {
    if (gameOver) return;
    if (!selected) return;

    const move = legalMoves.find(m => m.to.x === x && m.to.y === y);
    if (!move) {
      selected = null;
      legalMoves = [];
      render();
      return;
    }

    if (selected.type === 'board') {
      applyMove(move, 'player');
    } else if (selected.type === 'hand') {
      applyDrop(move, 'player');
    }
  }

  function onHandPieceClick(side, type) {
    if (gameOver) return;
    if (side !== 'player') return;
    if (!playerHand[type]) return;

    if (selected && selected.type === 'hand' && selected.pieceType === type) {
      selected = null;
      legalMoves = [];
    } else {
      selected = { type: 'hand', side, pieceType: type };
      legalMoves = generateDropsForPiece(type, 'player');
    }
    render();
  }

  function generateMovesForPiece(x, y, piece, side) {
    const dir = side === 'player' ? -1 : 1;
    const moves = [];
    const addMove = (nx, ny, drop = false) => {
      if (nx < 0 || nx > 8 || ny < 0 || ny > 8) return;
      const target = board[ny][nx];
      if (target && target.side === side) return;
      moves.push({
        from: { x, y },
        to: { x: nx, y: ny },
        capture: target ? target : null,
        drop
      });
    };

    const t = piece.type;
    const promoted = piece.promoted;

    const step = (dx, dy) => {
      addMove(x + dx, y + dy);
    };
    const slide = (dx, dy) => {
      let nx = x + dx;
      let ny = y + dy;
      while (nx >= 0 && nx < 9 && ny >= 0 && ny < 9) {
        const target = board[ny][nx];
        if (!target) {
          addMove(nx, ny);
        } else {
          if (target.side !== side) addMove(nx, ny);
          break;
        }
        nx += dx;
        ny += dy;
      }
    };

    if (!promoted) {
      switch (t) {
        case 'P':
          step(0, dir);
          break;
        case 'L':
          slide(0, dir);
          break;
        case 'N':
          addMove(x - 1, y + 2 * dir);
          addMove(x + 1, y + 2 * dir);
          break;
        case 'S':
          step(-1, dir);
          step(0, dir);
          step(1, dir);
          step(-1, -dir);
          step(1, -dir);
          break;
        case 'G':
        case 'K':
        case 'k':
          step(-1, dir);
          step(0, dir);
          step(1, dir);
          step(-1, 0);
          step(1, 0);
          step(0, -dir);
          if (t === 'K' || t === 'k') {
            step(-1, -dir);
            step(1, -dir);
          }
          break;
        case 'B':
          slide(1, 1);
          slide(1, -1);
          slide(-1, 1);
          slide(-1, -1);
          break;
        case 'R':
          slide(1, 0);
          slide(-1, 0);
          slide(0, 1);
          slide(0, -1);
          break;
      }
    } else {
      if (t === 'B') {
        slide(1, 1);
        slide(1, -1);
        slide(-1, 1);
        slide(-1, -1);
        step(1, 0);
        step(-1, 0);
        step(0, 1);
        step(0, -1);
      } else if (t === 'R') {
        slide(1, 0);
        slide(-1, 0);
        slide(0, 1);
        slide(0, -1);
        step(1, 1);
        step(1, -1);
        step(-1, 1);
        step(-1, -1);
      } else {
        // 成り駒（と金など）は金と同じ
        step(-1, dir);
        step(0, dir);
        step(1, dir);
        step(-1, 0);
        step(1, 0);
        step(0, -dir);
      }
    }

    return moves;
  }

  function generateDropsForPiece(type, side) {
    const moves = [];
    for (let y = 0; y < 9; y++) {
      for (let x = 0; x < 9; x++) {
        if (!board[y][x]) {
          // 簡易チェック：二歩などは無視してシンプルに
          moves.push({
            from: null,
            to: { x, y },
            drop: true,
            pieceType: type
          });
        }
      }
    }
    return moves;
  }

  function applyMove(move, side) {
    const { from, to, capture } = move;
    const piece = board[from.y][from.x];
    board[from.y][from.x] = null;

    // 成り（簡易）：敵陣に入ったら自動成り
    const zone = side === 'player' ? 0 : 6;
    const inZone = side === 'player' ? (to.y <= 2 || from.y <= 2) : (to.y >= 6 || from.y >= 6);
    if (!piece.promoted && ['P','L','N','S','B','R'].includes(piece.type) && inZone) {
      piece.promoted = true;
    }

    if (capture) {
      if (capture.type === 'K' || capture.type === 'k') {
        board[to.y][to.x] = piece;
        lastMove = { from, to };
        render();
        endGame(side === 'player' ? 'win' : 'lose');
        return;
      }
      const baseType = capture.type === 'k' || capture.type === 'K' ? 'K' : capture.type;
      const unpromoted = baseType.replace('+', '');
      const handType = ['K','k'].includes(unpromoted) ? 'K' : unpromoted;
      if (side === 'player') {
        playerHand[handType] = (playerHand[handType] || 0) + 1;
      } else {
        aiHand[handType] = (aiHand[handType] || 0) + 1;
      }
    }

    board[to.y][to.x] = piece;
    lastMove = { from, to };
    selected = null;
    legalMoves = [];
    render();

    if (side === 'player') {
      statusBar.textContent = 'AIの手番です…';
      setTimeout(aiTurn, 300);
    } else {
      statusBar.textContent = 'あなたの手番です。';
    }
  }

  function applyDrop(move, side) {
    const { to, pieceType } = move;
    const piece = { side, type: pieceType, promoted: false };
    board[to.y][to.x] = piece;

    if (side === 'player') {
      playerHand[pieceType]--;
      if (playerHand[pieceType] <= 0) delete playerHand[pieceType];
    } else {
      aiHand[pieceType]--;
      if (aiHand[pieceType] <= 0) delete aiHand[pieceType];
    }

    lastMove = { from: null, to };
    selected = null;
    legalMoves = [];
    render();

    if (side === 'player') {
      statusBar.textContent = 'AIの手番です…';
      setTimeout(aiTurn, 300);
    } else {
      statusBar.textContent = 'あなたの手番です。';
    }
  }

  function aiTurn() {
    if (gameOver) return;

    const moves = [];
    // 盤上の駒
    for (let y = 0; y < 9; y++) {
      for (let x = 0; x < 9; x++) {
        const piece = board[y][x];
        if (piece && piece.side === 'ai') {
          const pm = generateMovesForPiece(x, y, piece, 'ai');
          pm.forEach(m => {
            m.piece = piece;
            moves.push(m);
          });
        }
      }
    }
    // 持ち駒の打ち
    Object.keys(aiHand).forEach(type => {
      const dm = generateDropsForPiece(type, 'ai');
      dm.forEach(m => {
        m.pieceType = type;
        moves.push(m);
      });
    });

    if (moves.length === 0) {
      endGame('win');
      return;
    }

    const diff = parseInt(difficultyEl.value, 10);
    const scored = moves.map(m => {
      let score = 0;
      if (m.capture) {
        const val = pieceValue(m.capture.type);
        score += val * 2;
        if (m.capture.type === 'K' || m.capture.type === 'k') score += 1000;
      }
      if (m.drop) score += 0.5;
      if (m.to.y === 4) score += 0.2;
      if (m.to.y < 4) score += 0.3;
      if (diff >= 3 && !m.drop && !m.capture) score += 0.1;
      if (diff >= 4 && m.capture) score += 0.5;
      if (diff >= 5) {
        // 王に近づくほど加点
        const kingPos = findKing('player');
        if (kingPos) {
          const dx = Math.abs(kingPos.x - m.to.x);
          const dy = Math.abs(kingPos.y - m.to.y);
          score += (8 - (dx + dy)) * 0.1;
        }
      }
      return { move: m, score };
    });

    scored.sort((a, b) => b.score - a.score);

    let chosen;
    if (diff === 1) {
      const subset = scored.slice(-Math.max(1, Math.floor(scored.length * 0.5)));
      chosen = subset[Math.floor(Math.random() * subset.length)].move;
    } else if (diff === 2) {
      const subset = scored.slice(-Math.max(1, Math.floor(scored.length * 0.3)));
      chosen = subset[Math.floor(Math.random() * subset.length)].move;
    } else if (diff === 3) {
      const subset = scored.slice(0, Math.max(1, Math.floor(scored.length * 0.4)));
      chosen = subset[Math.floor(Math.random() * subset.length)].move;
    } else if (diff === 4) {
      const subset = scored.slice(0, Math.max(1, Math.floor(scored.length * 0.2)));
      chosen = subset[Math.floor(Math.random() * subset.length)].move;
    } else {
      const subset = scored.slice(0, Math.max(1, Math.floor(scored.length * 0.1)));
      chosen = subset[Math.floor(Math.random() * subset.length)].move;
    }

    if (chosen.drop) {
      applyDrop(chosen, 'ai');
      showMoveBanner(describeAiMove(chosen, true));
    } else {
      applyMove(chosen, 'ai');
      showMoveBanner(describeAiMove(chosen, false));
    }
  }

  function pieceValue(type) {
    const t = type.replace('+', '');
    switch (t) {
      case 'P': return 1;
      case 'L': return 2;
      case 'N': return 3;
      case 'S': return 4;
      case 'G': return 5;
      case 'B': return 7;
      case 'R': return 8;
      case 'K':
      case 'k': return 100;
      default: return 1;
    }
  }

  function findKing(side) {
    for (let y = 0; y < 9; y++) {
      for (let x = 0; x < 9; x++) {
        const p = board[y][x];
        if (!p) continue;
        if (side === 'player' && p.type === 'K' && p.side === 'player') return { x, y };
        if (side === 'ai' && p.type === 'k' && p.side === 'ai') return { x, y };
      }
    }
    return null;
  }

  function describeAiMove(move, isDrop) {
    if (isDrop) {
      const name = PIECES[move.pieceType].name;
      return `AIの手：${name}を打ちました`;
    } else {
      const piece = move.piece || board[move.to.y][move.to.x];
      const name = getPieceChar(piece);
      if (move.capture) {
        return `AIの手：${name}で${getPieceChar(move.capture)}を取りました`;
      } else {
        return `AIの手：${name}を動かしました`;
      }
    }
  }

  function showMoveBanner(text) {
    moveBanner.textContent = text;
    moveBanner.classList.add('show');
    setTimeout(() => {
      moveBanner.classList.remove('show');
    }, 2500);
  }

  function endGame(result) {
    gameOver = true;
    if (result === 'win') {
      resultTitle.textContent = '勝利！';
      resultText.textContent = 'あなたの勝ちです。お見事。';
    } else {
      resultTitle.textContent = '敗北…';
      resultText.textContent = 'AIの勝ちです。また挑戦してみてください。';
    }
    resultOverlay.classList.add('show');
  }

  resetBtn.addEventListener('click', () => {
    resultOverlay.classList.remove('show');
    initBoard();
  });

  againBtn.addEventListener('click', () => {
    resultOverlay.classList.remove('show');
    initBoard();
  });

  initBoard();
</script>
</body>
</html>
