<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シンプル将棋</title>
<style>
  :root {
    --board-size: min(90vw, 90vh);
    --cell-size: calc(var(--board-size) / 9);
    --bg: #f3e0c2;
    --line: #8b6b3f;
    --piece-self: #222;
    --piece-ai: #b03030;
    --highlight: rgba(255, 230, 120, 0.8);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 10px;
  }
  .app {
    width: 100%;
    max-width: 900px;
  }
  .top-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .top-bar label {
    font-size: 14px;
  }
  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  input[type="range"] {
    width: 140px;
  }
  .msg-bar {
    position: relative;
    min-height: 24px;
    font-size: 14px;
    color: #333;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .msg {
    position: absolute;
    left: 0;
    top: 0;
    padding: 2px 6px;
    background: rgba(255,255,255,0.9);
    border-radius: 4px;
    border: 1px solid #ddd;
    max-width: 100%;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
  }
  .board-wrap {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: flex-start;
  }
  .board {
    position: relative;
    width: var(--board-size);
    max-width: 100%;
    aspect-ratio: 1 / 1;
    border: 3px solid var(--line);
    background: #f7e7c6;
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-template-rows: repeat(9, 1fr);
  }
  .cell {
    border: 1px solid rgba(139,107,63,0.6);
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: calc(var(--cell-size) * 0.55);
    cursor: pointer;
    user-select: none;
  }
  .cell.highlight {
    background: var(--highlight);
  }
  .piece {
    width: 90%;
    height: 90%;
    border-radius: 6px;
    background: #fdf5dd;
    border: 2px solid #c49a5a;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    font-weight: 700;
  }
  .piece.self { color: var(--piece-self); }
  .piece.ai { color: var(--piece-ai); }
  .piece.promoted::before {
    content: "成";
    position: absolute;
    left: 2px;
    top: 0;
    font-size: 0.35em;
    color: red;
    font-weight: 900;
  }
  .piece.ai {
    transform: rotate(180deg);
  }
  .hands {
    flex: 1;
    min-width: 140px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 14px;
  }
  .hand {
    background: rgba(255,255,255,0.8);
    border-radius: 6px;
    border: 1px solid #d0b48a;
    padding: 4px;
  }
  .hand-title {
    font-weight: 600;
    margin-bottom: 2px;
  }
  .hand-pieces {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .hand-piece {
    min-width: 26px;
    padding: 2px 4px;
    border-radius: 4px;
    border: 1px solid #c49a5a;
    background: #fdf5dd;
    text-align: center;
    cursor: pointer;
  }
  .hand-piece.selected {
    outline: 2px solid #ff9800;
  }
  .status-bar {
    margin-top: 6px;
    font-size: 14px;
  }
  .status-turn {
    font-weight: 600;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  .overlay.show { display: flex; }
  .overlay-box {
    background: #fffaf0;
    border-radius: 10px;
    padding: 18px 24px;
    text-align: center;
    border: 3px solid #c49a5a;
    animation: pop 0.4s ease-out;
  }
  .overlay-box h2 {
    margin: 0 0 6px;
    font-size: 22px;
  }
  .overlay-box p {
    margin: 0;
    font-size: 14px;
  }
  @keyframes pop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  @media (max-width: 600px) {
    .piece { font-size: calc(var(--cell-size) * 0.5); }
    .top-bar { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="slider-wrap">
      <label for="difficulty">難易度</label>
      <input id="difficulty" type="range" min="1" max="10" value="1">
      <span id="difficultyValue">1</span>
    </div>
    <label>
      <input type="checkbox" id="toggleHighlight" checked>
      駒のいける方向オン
    </label>
  </div>
  <div class="msg-bar"><div id="msg" class="msg" style="display:none;"></div></div>
  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="hands">
      <div class="hand">
        <div class="hand-title">あなたの持ち駒</div>
        <div id="handSelf" class="hand-pieces"></div>
      </div>
      <div class="hand">
        <div class="hand-title">相手の持ち駒</div>
        <div id="handAI" class="hand-pieces"></div>
      </div>
      <div class="status-bar">
        <span class="status-turn" id="turnText">あなたの手番</span>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box" id="overlayBox">
    <h2 id="overlayTitle"></h2>
    <p id="overlayText"></p>
  </div>
</div>

<script>
(() => {
  const boardEl = document.getElementById('board');
  const handSelfEl = document.getElementById('handSelf');
  const handAIEl = document.getElementById('handAI');
  const msgEl = document.getElementById('msg');
  const turnTextEl = document.getElementById('turnText');
  const diffEl = document.getElementById('difficulty');
  const diffValEl = document.getElementById('difficultyValue');
  const toggleHighlightEl = document.getElementById('toggleHighlight');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayText = document.getElementById('overlayText');

  const SIZE = 9;
  const SELF = 'self';
  const AI = 'ai';

  const PIECES = {
    FU: '歩', KY: '香', KE: '桂', GI: '銀', KI: '金',
    KA: '角', HI: '飛', OU: '王', GY: '玉'
  };

  const PROMOTABLE = ['FU','KY','KE','GI','KA','HI'];

  let board = [];
  let hands = {
    self: {},
    ai: {}
  };
  let turn = SELF;
  let selected = null; // {x,y} or {hand:true,type,owner}
  let highlightCells = [];
  let msgTimer = null;
  let gameOver = false;

  function initBoard() {
    board = Array.from({length: SIZE}, () => Array(SIZE).fill(null));
    // 自陣（下）
    const backSelf = ['KY','KE','GI','KI','OU','KI','GI','KE','KY'];
    for (let x = 0; x < SIZE; x++) {
      board[8][x] = makePiece(backSelf[x], SELF);
      board[6][x] = makePiece('FU', SELF);
    }
    board[7][1] = makePiece('HI', SELF);
    board[7][7] = makePiece('KA', SELF);

    // 相手（上）
    const backAI = ['KY','KE','GI','KI','GY','KI','GI','KE','KY'];
    for (let x = 0; x < SIZE; x++) {
      board[0][x] = makePiece(backAI[x], AI);
      board[2][x] = makePiece('FU', AI);
    }
    board[1][7] = makePiece('HI', AI);
    board[1][1] = makePiece('KA', AI);

    hands.self = {};
    hands.ai = {};
    turn = SELF;
    selected = null;
    highlightCells = [];
    gameOver = false;
    render();
    setTurnText();
  }

  function makePiece(type, owner, promoted=false) {
    return { type, owner, promoted };
  }

  function render() {
    boardEl.innerHTML = '';
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.x = x;
        cell.dataset.y = y;
        if (highlightCells.some(p => p.x === x && p.y === y)) {
          cell.classList.add('highlight');
        }
        const p = board[y][x];
        if (p) {
          const pieceEl = document.createElement('div');
          pieceEl.className = 'piece ' + p.owner + (p.promoted ? ' promoted' : '');
          pieceEl.textContent = PIECES[p.type];
          cell.appendChild(pieceEl);
        }
        cell.addEventListener('click', () => onCellClick(x, y));
        cell.addEventListener('touchstart', (e) => { e.preventDefault(); onCellClick(x, y); }, {passive:false});
        boardEl.appendChild(cell);
      }
    }
    renderHands();
  }

  function renderHands() {
    handSelfEl.innerHTML = '';
    handAIEl.innerHTML = '';
    const selfTypes = Object.keys(hands.self);
    selfTypes.forEach(t => {
      const count = hands.self[t];
      if (!count) return;
      const el = document.createElement('div');
      el.className = 'hand-piece';
      if (selected && selected.hand && selected.owner === SELF && selected.type === t) {
        el.classList.add('selected');
      }
      el.textContent = PIECES[t] + (count > 1 ? `×${count}` : '');
      el.addEventListener('click', () => onHandClick(SELF, t));
      handSelfEl.appendChild(el);
    });
    const aiTypes = Object.keys(hands.ai);
    aiTypes.forEach(t => {
      const count = hands.ai[t];
      if (!count) return;
      const el = document.createElement('div');
      el.className = 'hand-piece';
      el.textContent = PIECES[t] + (count > 1 ? `×${count}` : '');
      handAIEl.appendChild(el);
    });
  }

  function onHandClick(owner, type) {
    if (gameOver) return;
    if (owner !== SELF || turn !== SELF) return;
    selected = { hand: true, owner, type };
    highlightCells = getDropTargets(owner, type);
    if (!toggleHighlightEl.checked) highlightCells = [];
    render();
  }

  function onCellClick(x, y) {
    if (gameOver) return;
    if (turn !== SELF) return;

    const cellPiece = board[y][x];

    if (selected && selected.hand) {
      // 持ち駒を打つ
      if (!cellPiece) {
        const legal = getDropTargets(SELF, selected.type);
        if (!legal.some(p => p.x === x && p.y === y)) {
          clearSelection();
          return;
        }
        dropPiece(SELF, selected.type, x, y);
        const name = `打ち手: ${PIECES[selected.type]} (${x+1},${9-y})`;
        showMoveName(name);
        endTurn();
      }
      clearSelection();
      return;
    }

    if (!selected) {
      if (cellPiece && cellPiece.owner === SELF) {
        selected = { x, y };
        highlightCells = toggleHighlightEl.checked ? getLegalMoves(x, y) : [];
        render();
      }
      return;
    }

    // すでに選択中の駒がある
    const from = { x: selected.x, y: selected.y };
    const piece = board[from.y][from.x];
    if (!piece || piece.owner !== SELF) {
      clearSelection();
      return;
    }

    // 同じマスを再クリックでキャンセル
    if (from.x === x && from.y === y) {
      clearSelection();
      return;
    }

    const legalMoves = getLegalMoves(from.x, from.y);
    if (!legalMoves.some(p => p.x === x && p.y === y)) {
      clearSelection();
      return;
    }

    const captured = movePiece(from.x, from.y, x, y);
    const movedPiece = board[y][x];
    autoPromoteIfNeeded(movedPiece, from.y, y, SELF);

    const name = formatMoveName('あなた', movedPiece, from, {x,y}, captured);
    showMoveName(name);
    endTurn();
    clearSelection();
  }

  function clearSelection() {
    selected = null;
    highlightCells = [];
    render();
  }

  function setTurnText() {
    turnTextEl.textContent = turn === SELF ? 'あなたの手番' : '相手の手番';
  }

  function showMoveName(text) {
    if (!text) return;
    if (msgTimer) clearTimeout(msgTimer);
    msgEl.textContent = text;
    msgEl.style.display = 'inline-block';
    msgTimer = setTimeout(() => {
      msgEl.style.display = 'none';
    }, 2500);
  }

  function movePiece(fromX, fromY, toX, toY) {
    const piece = board[fromY][fromX];
    const target = board[toY][toX];
    let captured = null;
    if (target) {
      captured = {...target};
      addToHand(piece.owner, captured);
    }
    board[toY][toX] = piece;
    board[fromY][fromX] = null;
    return captured;
  }

  function dropPiece(owner, type, x, y) {
    if (!hands[owner][type]) return;
    hands[owner][type]--;
    if (hands[owner][type] <= 0) delete hands[owner][type];
    board[y][x] = makePiece(type, owner, false);
    render();
  }

  function addToHand(owner, piece) {
    const toOwner = owner === SELF ? SELF : AI;
    let type = piece.type;
    // 成りは元に戻す
    if (piece.promoted) {
      if (type === 'FU') type = 'FU';
      if (type === 'KY') type = 'KY';
      if (type === 'KE') type = 'KE';
      if (type === 'GI') type = 'GI';
      if (type === 'KA') type = 'KA';
      if (type === 'HI') type = 'HI';
    }
    if (type === 'OU' || type === 'GY') {
      // 王は取られた時点で勝敗
      return;
    }
    hands[toOwner][type] = (hands[toOwner][type] || 0) + 1;
  }

  function inZone(owner, y) {
    return owner === SELF ? y <= 2 : y >= 6;
  }

  function autoPromoteIfNeeded(piece, fromY, toY, owner) {
    if (!piece) return;
    if (!PROMOTABLE.includes(piece.type)) return;
    if (piece.promoted) return;
    if (inZone(owner, toY) && !inZone(owner, fromY)) {
      piece.promoted = true;
    }
  }

  function getLegalMoves(x, y) {
    const p = board[y][x];
    if (!p) return [];
    const dir = p.owner === SELF ? -1 : 1;
    const moves = [];

    const add = (nx, ny, repeat=false, goldLike=false) => {
      const dx = nx - x;
      const dy = ny - y;
      if (repeat) {
        let cx = x + Math.sign(dx);
        let cy = y + Math.sign(dy);
        while (cx >= 0 && cx < SIZE && cy >= 0 && cy < SIZE) {
          const t = board[cy][cx];
          if (t && t.owner === p.owner) break;
          moves.push({x:cx,y:cy});
          if (t && t.owner !== p.owner) break;
          cx += Math.sign(dx);
          cy += Math.sign(dy);
        }
      } else {
        if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) return;
        const t = board[ny][nx];
        if (t && t.owner === p.owner) return;
        moves.push({x:nx,y:ny});
      }
    };

    const goldMoves = () => {
      const d = p.owner === SELF ? -1 : 1;
      const deltas = [
        {dx:0,dy:d},{dx:-1,dy:d},{dx:1,dy:d},
        {dx:-1,dy:0},{dx:1,dy:0},{dx:0,dy:-d}
      ];
      deltas.forEach(o => add(x+o.dx, y+o.dy));
    };

    if (p.promoted && ['FU','KY','KE','GI'].includes(p.type)) {
      goldMoves();
    } else {
      switch (p.type) {
        case 'FU':
          add(x, y+dir);
          break;
        case 'KY':
          add(x, y+dir*8, true);
          break;
        case 'KE':
          add(x-1, y+dir*2);
          add(x+1, y+dir*2);
          break;
        case 'GI': {
          const d = dir;
          const deltas = [
            {dx:0,dy:d},{dx:-1,dy:d},{dx:1,dy:d},
            {dx:-1,dy:-d},{dx:1,dy:-d}
          ];
          deltas.forEach(o => add(x+o.dx, y+o.dy));
          break;
        }
        case 'KI':
          goldMoves();
          break;
        case 'KA':
          [[1,1],[1,-1],[-1,1],[-1,-1]].forEach(v => add(x+v[0]*8, y+v[1]*8, true));
          if (p.promoted) {
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(v => add(x+v[0], y+v[1]));
          }
          break;
        case 'HI':
          [[1,0],[-1,0],[0,1],[0,-1]].forEach(v => add(x+v[0]*8, y+v[1]*8, true));
          if (p.promoted) {
            [[1,1],[1,-1],[-1,1],[-1,-1]].forEach(v => add(x+v[0], y+v[1]));
          }
          break;
        case 'OU':
        case 'GY':
          for (let dy=-1; dy<=1; dy++) {
            for (let dx=-1; dx<=1; dx++) {
              if (dx===0 && dy===0) continue;
              add(x+dx, y+dy);
            }
          }
          break;
      }
    }
    return moves;
  }

  function getDropTargets(owner, type) {
    const targets = [];
    for (let y=0; y<SIZE; y++) {
      for (let x=0; x<SIZE; x++) {
        if (board[y][x]) continue;
        // 簡易ルール: 二歩・打ち歩詰めなどは無視
        if (type === 'FU') {
          // 端まで行けない位置は避ける
          if (owner === SELF && y === 0) continue;
          if (owner === AI && y === 8) continue;
        }
        if (type === 'KY') {
          if (owner === SELF && y === 0) continue;
          if (owner === AI && y === 8) continue;
        }
        if (type === 'KE') {
          if (owner === SELF && y <= 1) continue;
          if (owner === AI && y >= 7) continue;
        }
        targets.push({x,y});
      }
    }
    return targets;
  }

  function findKing(owner) {
    const targetType = owner === SELF ? 'OU' : 'GY';
    for (let y=0; y<SIZE; y++) {
      for (let x=0; x<SIZE; x++) {
        const p = board[y][x];
        if (p && p.owner === owner && (p.type === targetType)) {
          return {x,y};
        }
      }
    }
    return null;
  }

  function isKingCaptured(owner) {
    return !findKing(owner);
  }

  function endTurn() {
    if (isKingCaptured(AI)) {
      showResult(true);
      return;
    }
    if (isKingCaptured(SELF)) {
      showResult(false);
      return;
    }
    turn = turn === SELF ? AI : SELF;
    setTurnText();
    render();
    if (turn === AI && !gameOver) {
      setTimeout(aiMove, 300);
    }
  }

  function showResult(win) {
    gameOver = true;
    overlayTitle.textContent = win ? '勝利！' : '敗北…';
    overlayText.textContent = win ? '王を取りました。おめでとう。' : '玉を取られてしまいました。';
    overlay.classList.add('show');
    setTimeout(() => {
      overlay.addEventListener('click', () => {
        overlay.classList.remove('show');
        initBoard();
      }, {once:true});
    }, 0);
  }

  function cloneState() {
    return {
      board: board.map(row => row.map(p => p ? {...p} : null)),
      hands: {
        self: {...hands.self},
        ai: {...hands.ai}
      }
    };
  }

  function restoreState(state) {
    board = state.board.map(row => row.map(p => p ? {...p} : null));
    hands.self = {...state.hands.self};
    hands.ai = {...state.hands.ai};
  }

  function allMoves(owner) {
    const moves = [];
    for (let y=0; y<SIZE; y++) {
      for (let x=0; x<SIZE; x++) {
        const p = board[y][x];
        if (!p || p.owner !== owner) continue;
        const legal = getLegalMoves(x,y);
        legal.forEach(t => {
          moves.push({
            from:{x,y},
            to:{x:t.x,y:t.y},
            piece:p
          });
        });
      }
    }
    // 打ち手
    const hand = hands[owner];
    Object.keys(hand).forEach(type => {
      if (!hand[type]) return;
      const targets = getDropTargets(owner, type);
      targets.forEach(t => {
        moves.push({
          drop:true,
          owner,
          type,
          to:{x:t.x,y:t.y}
        });
      });
    });
    return moves;
  }

  function evaluate(owner) {
    const values = {
      FU:1, KY:3, KE:3, GI:4, KI:5, KA:8, HI:9, OU:100, GY:100
    };
    let score = 0;
    for (let y=0; y<SIZE; y++) {
      for (let x=0; x<SIZE; x++) {
        const p = board[y][x];
        if (!p) continue;
        let v = values[p.type] || 0;
        if (p.promoted && PROMOTABLE.includes(p.type)) v += 2;
        score += (p.owner === owner ? v : -v);
      }
    }
    const hand = hands[owner];
    Object.keys(hand).forEach(t => {
      score += (values[t] || 0) * hand[t] * 0.8;
    });
    const handO = hands[owner === SELF ? AI : SELF];
    Object.keys(handO).forEach(t => {
      score -= (values[t] || 0) * handO[t] * 0.8;
    });
    return score;
  }

  function aiMove() {
    if (gameOver) return;
    const owner = AI;
    const moves = allMoves(owner);
    if (moves.length === 0) {
      showResult(true);
      return;
    }
    const difficulty = parseInt(diffEl.value, 10);
    let bestScore = -Infinity;
    let bestMoves = [];

    moves.forEach(m => {
      const state = cloneState();
      let captured = null;
      if (m.drop) {
        dropPiece(owner, m.type, m.to.x, m.to.y);
      } else {
        captured = movePiece(m.from.x, m.from.y, m.to.x, m.to.y);
        const moved = board[m.to.y][m.to.x];
        autoPromoteIfNeeded(moved, m.from.y, m.to.y, owner);
      }
      const score = evaluate(owner);
      restoreState(state);

      let bonus = 0;
      if (!m.drop && captured) bonus += 3;
      if (!m.drop) {
        const fromY = m.from.y;
        const toY = m.to.y;
        const p = m.piece;
        if (PROMOTABLE.includes(p.type)) {
          if (inZone(owner, toY) && !inZone(owner, fromY)) bonus += 2;
        }
      }
      const total = score + bonus * (difficulty / 5);

      if (total > bestScore - 0.0001) {
        if (total > bestScore + 0.0001) {
          bestScore = total;
          bestMoves = [m];
        } else {
          bestMoves.push(m);
        }
      }
    });

    let chosen;
    if (difficulty <= 3) {
      // 低難易度: ランダム寄り
      const pool = moves;
      chosen = pool[Math.floor(Math.random() * pool.length)];
    } else if (difficulty <= 7) {
      // 中難易度: ベスト候補からランダム
      chosen = bestMoves[Math.floor(Math.random() * bestMoves.length)];
    } else {
      // 高難易度: ベストの中でも捕獲優先
      const captureBest = bestMoves.filter(m => {
        if (m.drop) return false;
        const t = board[m.to.y][m.to.x];
        return !!t;
      });
      chosen = (captureBest[0]) || bestMoves[Math.floor(Math.random() * bestMoves.length)];
    }

    if (!chosen) chosen = moves[0];

    // 実際に指す
    let captured = null;
    if (chosen.drop) {
      dropPiece(owner, chosen.type, chosen.to.x, chosen.to.y);
    } else {
      captured = movePiece(chosen.from.x, chosen.from.y, chosen.to.x, chosen.to.y);
      const moved = board[chosen.to.y][chosen.to.x];
      autoPromoteIfNeeded(moved, chosen.from.y, chosen.to.y, owner);
    }

    const movedPiece = chosen.drop ? board[chosen.to.y][chosen.to.x] : board[chosen.to.y][chosen.to.x];
    const name = formatMoveName('相手', movedPiece, chosen.from, chosen.to, captured, chosen.drop);
    showMoveName(name);
    endTurn();
  }

  function formatMoveName(playerLabel, piece, from, to, captured, drop=false) {
    if (!piece) return '';
    const pieceName = PIECES[piece.type] + (piece.promoted ? '成' : '');
    const posTo = `(${to.x+1},${9-to.y})`;
    let base = `${playerLabel}: ${pieceName}${drop ? '打' : ''} ${posTo}`;
    if (from && !drop) {
      const posFrom = `(${from.x+1},${9-from.y})`;
      base += ` ← ${posFrom}`;
    }
    if (captured) {
      base += ` 取り: ${PIECES[captured.type]}`;
    }
    return base;
  }

  diffEl.addEventListener('input', () => {
    diffValEl.textContent = diffEl.value;
  });

  initBoard();
})();
</script>
